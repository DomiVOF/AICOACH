<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Blueprint</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--dark:#111;--card:#161616;--border:#252525;--border2:#1e1e1e;
  --accent:#c8f135;--red:#ff5c35;--blue:#7eb8f7;--orange:#ffb347;--purple:#b464ff;
  --text:#e8e8e8;--muted:#555;--white:#f5f5f5;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;overscroll-behavior:none;}
body{display:flex;flex-direction:column;overflow:hidden;}

/* SCROLL AREA */
#app{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px;padding-top:110px;}

/* HEADER */
.header{padding:36px 20px 12px;border-bottom:1px solid var(--border);background:var(--bg);position:fixed;top:0;left:0;right:0;z-index:50;}
.header-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:4px;}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--white);line-height:1;}
.header-sub{font-size:10px;color:var(--muted);margin-top:2px;}

/* NAV */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
nav button{flex:1;background:none;border:none;padding:10px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);transition:color .2s;}
nav button.active{color:var(--accent);}
nav button svg{width:20px;height:20px;stroke-width:1.5;}

/* SECTION */
.section{padding:16px 16px 0;}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:10px 0 0 10px;}
.card.red::before{background:var(--red);}
.card.blue::before{background:var(--blue);}
.card.orange::before{background:var(--orange);}
.card.purple::before{background:var(--purple);}
.card.grey::before{background:var(--muted);}
.card-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}

/* CHECK ROW */
.check-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border2);cursor:pointer;user-select:none;}
.check-row:last-child{border-bottom:none;}
.check-row.done .check-label{text-decoration:line-through;color:var(--muted);}
.checkbox{width:22px;height:22px;border-radius:5px;border:2px solid #333;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.checkbox.checked{background:var(--accent);border-color:var(--accent);}
.checkbox.checked svg{display:block;}
.checkbox svg{display:none;width:12px;height:12px;stroke:#0a0a0a;stroke-width:3;fill:none;}
.check-label{flex:1;font-size:13px;color:var(--text);}
.check-right{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--accent);}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-top:2px;}

/* RINGS ROW */
.rings-row{display:flex;justify-content:space-around;align-items:center;padding:16px 0;border-bottom:1px solid var(--border2);margin-bottom:14px;}
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.ring-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}

/* PROGRESS BAR */
.progress-bar{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;margin:8px 0;}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease;background:var(--accent);}
.progress-fill.red{background:var(--red);}
.progress-fill.blue{background:var(--blue);}

/* CALORIE DISPLAY */
.kcal-display{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.kcal-big{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);letter-spacing:1px;}
.kcal-target{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}

/* ADJUST BANNER */
.adjust-over{background:rgba(200,241,53,.07);border:1px solid rgba(200,241,53,.25);border-radius:8px;padding:10px 14px;margin-top:10px;font-size:12px;color:var(--accent);line-height:1.5;}
.adjust-under{background:rgba(255,92,53,.07);border:1px solid rgba(255,92,53,.25);border-radius:8px;padding:10px 14px;margin-top:10px;font-size:12px;color:var(--red);line-height:1.5;}

/* MACRO ROW */
.macro-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.macro-pill{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;text-align:center;flex:1;min-width:64px;}
.macro-val{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.macro-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}

/* MEAL CARD */
.meal-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.meal-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border2);background:rgba(200,241,53,.03);}
.meal-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:2px;}
.meal-name{font-size:14px;font-weight:500;color:var(--white);}
.meal-kcal{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);letter-spacing:1px;}
.meal-done .meal-kcal{color:var(--muted);}
.meal-done .meal-name{color:var(--muted);}
.meal-body{padding:10px 14px;}
.meal-item{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border2);font-size:12px;}
.meal-item:last-child{border-bottom:none;}
.meal-item span{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.meal-check-btn{width:26px;height:26px;border-radius:6px;border:2px solid #333;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;}
.meal-check-btn.checked{background:var(--accent);border-color:var(--accent);}
.meal-check-btn.checked svg{display:block;}
.meal-check-btn svg{display:none;width:13px;height:13px;stroke:#0a0a0a;stroke-width:3;fill:none;}

/* DAY PILLS */
.day-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.day-pill{padding:6px 12px;border-radius:20px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;background:var(--card);color:var(--muted);border:1px solid var(--border);white-space:nowrap;cursor:pointer;}
.day-pill.today{background:var(--accent);color:#0a0a0a;border-color:var(--accent);}

/* INPUT */
.input-group{margin-bottom:12px;}
.input-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
input[type=number],input[type=text]{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:16px;padding:12px 14px;width:100%;outline:none;font-family:'DM Sans',sans-serif;-webkit-appearance:none;}
input:focus{border-color:var(--accent);}
.input-row{display:flex;gap:10px;}
.input-row .input-group{flex:1;}

/* BUTTON */
.btn{background:var(--accent);color:#0a0a0a;border:none;border-radius:8px;padding:13px 20px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;margin-top:4px;letter-spacing:.5px;}

/* HISTORY ROW */
.history-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border2);font-size:12px;}
.history-row:last-child{border-bottom:none;}
.history-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}

/* PHASE BANNER */
.phase-banner{background:var(--accent);color:#0a0a0a;border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.phase-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;}
.phase-detail{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;}

/* SESSION TITLE */
.session-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:10px 0 6px;border-bottom:1px solid var(--border2);margin-bottom:6px;}

/* SUPP TAG */
.supp-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:20px;white-space:nowrap;}
.tag-morning{background:rgba(200,241,53,.1);color:var(--accent);}
.tag-pre{background:rgba(255,179,71,.1);color:var(--orange);}
.tag-post{background:rgba(255,92,53,.1);color:var(--red);}
.tag-bed{background:rgba(180,100,255,.1);color:var(--purple);}
.tag-eve{background:rgba(126,184,247,.1);color:var(--blue);}

/* WEEKLY BANNER */
.weekly-banner{background:rgba(200,241,53,.07);border:1px solid rgba(200,241,53,.25);border-radius:10px;padding:14px 16px;margin-bottom:12px;}
.weekly-banner.dismiss{display:none;}
.weekly-title{font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:2px;color:var(--accent);margin-bottom:8px;}
.weekly-item{font-size:12px;color:var(--text);padding:4px 0;border-bottom:1px solid var(--border2);line-height:1.5;}
.weekly-item:last-child{border-bottom:none;}
.weekly-btns{display:flex;gap:8px;margin-top:12px;}
.weekly-btn-accept{flex:1;background:var(--accent);color:#0a0a0a;border:none;border-radius:6px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.weekly-btn-dismiss{flex:1;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:13px;cursor:pointer;font-family:"DM Sans",sans-serif;}

/* GRAPH */
.graph-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;padding:14px 16px;margin-bottom:12px;}
.graph-tabs{display:flex;gap:6px;margin-bottom:12px;}
.graph-tab{font-family:"DM Mono",monospace;font-size:10px;letter-spacing:1px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--muted);cursor:pointer;background:none;}
.graph-tab.active{background:var(--accent);color:#0a0a0a;border-color:var(--accent);}

/* AI COACH */
.coach-fab{position:fixed;bottom:80px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:200;box-shadow:0 4px 20px rgba(200,241,53,.4);transition:transform .2s;}
.coach-fab:active{transform:scale(.92);}
.coach-panel{position:fixed;bottom:0;left:0;right:0;height:75vh;background:#111;border-top:1px solid var(--border);border-radius:20px 20px 0 0;z-index:300;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s ease;}
.coach-panel.open{transform:translateY(0);}
.coach-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.coach-title{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:2px;color:var(--white);}
.coach-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px;}
.coach-messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;}
.msg.user{background:var(--accent);color:#0a0a0a;align-self:flex-end;border-radius:12px 12px 2px 12px;}
.msg.ai{background:var(--card);color:var(--text);align-self:flex-start;border-radius:12px 12px 12px 2px;border:1px solid var(--border);}
.msg.ai.loading{color:var(--muted);font-style:italic;}
.coach-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:calc(12px + env(safe-area-inset-bottom));}
.coach-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:14px;padding:10px 16px;outline:none;font-family:"DM Sans",sans-serif;}
.coach-input:focus{border-color:var(--accent);}
.coach-send{background:var(--accent);border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.coach-send svg{width:16px;height:16px;stroke:#0a0a0a;fill:none;stroke-width:2.5;}

/* COACH OVERLAY */
.coach-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299;display:none;}
.coach-overlay.open{display:block;}

/* EXPANDABLE MEALS *//* EXPANDABLE MEALS */
.meal-expand-row{border-bottom:1px solid var(--border2);}
.meal-expand-row:last-child{border-bottom:none;}
.meal-expand-row.done .meal-expand-name{color:var(--muted);text-decoration:line-through;}
.meal-expand-row.done .meal-expand-kcal{color:var(--muted);}
.meal-expand-header{display:flex;align-items:center;gap:10px;padding:10px 0;cursor:pointer;user-select:none;}
.meal-expand-info{flex:1;display:flex;flex-direction:column;gap:1px;}
.meal-expand-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:1px;}
.meal-expand-name{font-size:13px;color:var(--text);}
.meal-expand-kcal{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;}
.meal-expand-arrow{font-size:20px;color:var(--muted);width:16px;text-align:center;transition:transform .2s;line-height:1;font-weight:300;}
.meal-expand-arrow.open{transform:rotate(90deg);color:var(--accent);}
.meal-expand-body{background:rgba(255,255,255,.02);border-radius:8px;margin:0 0 10px 32px;overflow:hidden;}
.meal-expand-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border2);font-size:13px;color:var(--text);}
.meal-expand-item:last-child{border-bottom:none;}
.meal-expand-qty{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);}
.meal-expand-done-btn{padding:10px 12px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border-top:1px solid var(--border2);}

/* TRAINING MODULE */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.ex-header{padding:12px 14px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;}
.ex-name{font-size:14px;font-weight:500;color:var(--white);}
.ex-meta{display:flex;gap:8px;align-items:center;}
.ex-muscle{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:1px;padding:2px 8px;border-radius:20px;background:rgba(200,241,53,.1);color:var(--accent);}
.ex-sets-area{padding:12px 14px;}
.set-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2);}
.set-row:last-child{border-bottom:none;}
.set-num{font-family:"DM Mono",monospace;font-size:10px;color:var(--muted);width:40px;flex-shrink:0;}
.set-num.warmup{color:#ffb347;}
.set-reps{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);width:50px;flex-shrink:0;}
.set-weight-input{background:#1e1e1e;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;padding:6px 10px;width:70px;text-align:center;font-family:"DM Sans",sans-serif;outline:none;}
.set-weight-input:focus{border-color:var(--accent);}
.set-weight-input.warmup{border-color:rgba(255,179,71,.3);color:#ffb347;}
.set-done-btn{width:32px;height:32px;border-radius:50%;border:2px solid #333;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.set-done-btn.done{background:var(--accent);border-color:var(--accent);}
.set-done-btn svg{width:14px;height:14px;stroke:#0a0a0a;fill:none;stroke-width:3;display:none;}
.set-done-btn.done svg{display:block;}
.set-suggest{font-size:11px;color:var(--muted);flex:1;}
.set-suggest.changed{color:var(--accent);font-weight:600;}
.ex-footer{padding:8px 14px;background:rgba(255,255,255,.02);font-size:11px;color:var(--muted);display:flex;justify-content:space-between;}
.ex-footer.progressed{color:var(--accent);}

/* NUTRITION GRAPH */
.graph-metric-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.metric-pill{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:1px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--muted);cursor:pointer;background:none;}
.metric-pill.active{background:var(--accent);color:#0a0a0a;border-color:var(--accent);}

/* MUSCLE MAP */
.muscle-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.muscle-cell{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 6px;text-align:center;}
.muscle-cell.hit-high{border-color:#c8f135;background:rgba(200,241,53,.1);}
.muscle-cell.hit-med{border-color:#ffb347;background:rgba(255,179,71,.08);}
.muscle-cell.hit-low{border-color:#ff5c35;background:rgba(255,92,53,.06);}
.muscle-name{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.muscle-count{font-family:"Bebas Neue",sans-serif;font-size:20px;color:var(--white);line-height:1;}

/* DIFF HIGHLIGHT */
.diff-over{color:#ff5c35 !important;font-weight:700;}
.diff-under{color:#ffb347 !important;font-weight:700;}
.diff-ok{color:#c8f135 !important;}
</style>
</head>
<body>

<div id="app">
  <!-- content rendered by JS -->
</div>

<nav>
  <button id="nav-today" class="active" onclick="showTab('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    Today
  </button>
  <button id="nav-food" onclick="showTab('food')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
    Food
  </button>
  <button id="nav-train" onclick="showTab('train')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 4v16M18 4v16M2 8h4M18 8h4M2 16h4M18 16h4"/></svg>
    Train
  </button>
  <button id="nav-supps" onclick="showTab('supps')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10.5 20H4a2 2 0 01-2-2V5a2 2 0 012-2h3.9a2 2 0 011.69.9l.81 1.2a2 2 0 001.67.9H20a2 2 0 012 2v2.5"/><circle cx="17" cy="17" r="5"/><path d="M17 14v6M14 17h6"/></svg>
    Progr
  </button>
  <button id="nav-body" onclick="showTab('body')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
    Body
  </button>

// -- WEEKLY ANALYSIS ------------------------------------------------------
function getLastWeekStats(){
  const days=[];
  for(let i=1;i<=7;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    if(STATE.days[key])days.push({key,data:STATE.days[key]});
  }
  if(days.length<3)return null;
  const mealCompletion=days.map(d=>{
    const total=Object.keys(d.data.meals).length;
    const done=Object.values(d.data.meals).filter(Boolean).length;
    return done/total;
  });
  const trainCompletion=days.map(d=>{
    const am=Object.values(d.data.training?.am||{}).filter(Boolean).length;
    const pm=Object.values(d.data.training?.pm||{}).filter(Boolean).length;
    const dow=new Date(d.key).getDay();
    const dayKey=['SUN','MON','TUE','WED','THU','FRI','SAT'][dow];
    const total=(TRAINING[dayKey]?.am?.length||0)+(TRAINING[dayKey]?.pm?.length||0);
    return total>0?(am+pm)/total:1;
  });
  const avgMeal=mealCompletion.reduce((a,b)=>a+b,0)/mealCompletion.length;
  const avgTrain=trainCompletion.reduce((a,b)=>a+b,0)/trainCompletion.length;
  return{avgMeal,avgTrain,days:days.length};
}

function getWeeklySuggestions(){
  const stats=getLastWeekStats();
  if(!stats)return null;
  const suggestions=[];
  if(stats.avgMeal<0.7)suggestions.push("You completed <70% of meals last week. Consider prepping more on Sunday to avoid skipping.");
  if(stats.avgMeal>=0.9)suggestions.push("Excellent meal compliance last week (90%+). Stay consistent.");
  if(stats.avgTrain<0.6)suggestions.push("Training was below 60% last week. Consider dropping to 5 days if schedule is tight.");
  if(stats.avgTrain>=0.85)suggestions.push("Strong training week. Progressive overload - add 2.5kg on your main lifts this week.");
  const recentLog=STATE.bodyLog?.slice(-2)||[];
  if(recentLog.length===2){
    const wDiff=recentLog[1].weight-recentLog[0].weight;
    if(wDiff<-1)suggestions.push(`You lost ${Math.abs(wDiff).toFixed(1)}kg fast. Risk of muscle loss - consider adding 200 kcal this week.`);
    if(wDiff>0.5)suggestions.push(`Weight up ${wDiff.toFixed(1)}kg. If not intentional, reduce Meal 3 rice by 50g.`);
    if(wDiff>=-0.8&&wDiff<=-0.2)suggestions.push(`Weight loss on track (${Math.abs(wDiff).toFixed(1)}kg). Keep current calories.`);
  }
  return suggestions.length>0?suggestions:["Great week overall. Keep the current plan."];
}

function isMonday(){return new Date().getDay()===1;}


// --- SVG CHECK ----------------------------------------------------------------
const CHECK_SVG=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg>`;

// --- RINGS --------------------------------------------------------------------
function ring(pct,size,color,label){
  const stroke=size<60?4:5,r=(size-stroke*2)/2,circ=2*Math.PI*r;
  const offset=circ-(Math.min(100,pct)/100)*circ;
  return`<div class="ring-wrap">
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e1e1e" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}"
        stroke-width="${stroke}" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
        stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .4s ease"/>
      <text x="${size/2}" y="${size/2}" text-anchor="middle" dominant-baseline="middle"
        fill="#f5f5f5" font-size="${size<60?11:13}" font-family="'Bebas Neue',sans-serif" letter-spacing="0.5">${Math.round(pct)}%</text>
    </svg>
    <span class="ring-label">${label}</span>
  </div>`;
}

// --- CALCULATIONS --------------------------------------------------------------
function getDynamicTarget(){
  return STATE.weeklyKcalTarget||2900;
}

function getTrainingAdjustment(){
  var d=STATE.days[today];
  var hour=new Date().getHours();
  var amEx=TRAINING[DOW]?TRAINING[DOW].am.length:0;
  var pmEx=TRAINING[DOW]?TRAINING[DOW].pm.length:0;
  var amDone=Object.values(d.training.am||{}).filter(Boolean).length;
  var pmDone=Object.values(d.training.pm||{}).filter(Boolean).length;
  var adj=0;
  var reasons=[];
  if(hour>=10&&amEx>0&&amDone===0){adj-=150;reasons.push("AM session missed: -150 kcal");}
  if(hour>=20&&pmEx>0&&pmDone===0){adj-=300;reasons.push("PM session missed: -300 kcal");}
  if(amEx>0&&amDone>0&&amDone<amEx){adj-=75;reasons.push("AM partial: -75 kcal");}
  if(pmEx>0&&pmDone>0&&pmDone<pmEx){adj-=150;reasons.push("PM partial: -150 kcal");}
  return{adj:adj,reasons:reasons};
}

function calcStats(){
  var d=STATE.days[today];
  var kcalDone=MEALS.filter(function(m){return d.meals[m.id];}).reduce(function(a,m){return a+m.kcal;},0);
  var mealsDone=Object.values(d.meals).filter(Boolean).length;
  var suppsDone=Object.values(d.supps).filter(Boolean).length;
  var pepsDone=Object.values(d.peptides).filter(Boolean).length;
  var amEx=TRAINING[DOW]?TRAINING[DOW].am.length:0;
  var pmEx=TRAINING[DOW]?TRAINING[DOW].pm.length:0;
  var totalEx=amEx+pmEx;
  var trainDone=Object.values(d.training.am||{}).filter(Boolean).length+Object.values(d.training.pm||{}).filter(Boolean).length;
  var baseTarget=getDynamicTarget();
  var trainAdj=getTrainingAdjustment();
  var kcalTarget=baseTarget+trainAdj.adj;
  return{
    kcalDone:kcalDone,
    kcalTarget:kcalTarget,
    baseTarget:baseTarget,
    trainAdj:trainAdj,
    mealPct:(mealsDone/MEALS.length)*100,
    suppPct:(suppsDone/SUPPS.length)*100,
    pepPct:(pepsDone/PEPTIDES.length)*100,
    trainPct:totalEx>0?(trainDone/totalEx)*100:0,
    mealsDone:mealsDone,suppsDone:suppsDone,pepsDone:pepsDone,trainDone:trainDone,totalEx:totalEx,
    muscleMass:(STATE.currentWeight*(1-STATE.currentBF/100)).toFixed(1),
    fatMass:(STATE.currentWeight*STATE.currentBF/100).toFixed(1),
  };
}

// -- EXERCISE KEY ----------------------------------------------------------
function exKey(day, session, idx){ return "ex_"+day+"_"+session+"_"+idx; }

function getExData(day, session, idx){
  var key=exKey(day,session,idx);
  return STATE.exercises&&STATE.exercises[key]?STATE.exercises[key]:{weight:0,successCount:0,history:[]};
}

function saveExData(day, session, idx, data){
  if(!STATE.exercises)STATE.exercises={};
  STATE.exercises[exKey(day,session,idx)]=data;
  saveStore();
}

function getSuggestedWeight(day, session, idx){
  var data=getExData(day,session,idx);
  if(!data.weight)return null; // not set yet
  return data.weight;
}

function recordSetResult(day, session, idx, weight, completed){
  var data=getExData(day,session,idx);
  if(!data.history)data.history=[];
  data.weight=weight;
  // track consecutive successes
  if(completed){
    data.successCount=(data.successCount||0)+1;
    if(data.successCount>=2){
      // determine increment: bigger for compounds, smaller for isolations
      var ex=TRAINING[day][session][idx];
      var isCompound=["Barbell Bench Press","Barbell Back Squat","Deadlift","Barbell Row","Weighted Pull-ups","Front Squat","Sumo Deadlift","Romanian Deadlift","Overhead Press"].indexOf(ex.n)>=0;
      data.weight=parseFloat((data.weight+(isCompound?2.5:1.25)).toFixed(2));
      data.successCount=0;
      data.progressed=true;
    }
  } else {
    data.successCount=0;
    data.progressed=false;
  }
  data.history.push({date:todayKey(),weight:weight,completed:completed});
  if(data.history.length>20)data.history=data.history.slice(-20);
  saveExData(day,session,idx,data);
}

function updateSetWeight(day, session, idx, weight){
  var data=getExData(day,session,idx);
  data.weight=parseFloat(weight)||0;
  if(!data.successCount)data.successCount=0;
  saveExData(day,session,idx,data);
}

// -- SET STATE HELPERS -----------------------------------------------------
function getSetsDone(day, session, exIdx){
  var key="sets_"+todayKey()+"_"+day+"_"+session+"_"+exIdx;
  return STATE.setsDone&&STATE.setsDone[key]?STATE.setsDone[key]:{};
}

function markSetDone(day, session, exIdx, setIdx, weight){
  if(!STATE.setsDone)STATE.setsDone={};
  var key="sets_"+todayKey()+"_"+day+"_"+session+"_"+exIdx;
  if(!STATE.setsDone[key])STATE.setsDone[key]={};
  var wasDone=STATE.setsDone[key][setIdx];
  STATE.setsDone[key][setIdx]=!wasDone;
  // if completing final working set, record result
  var ex=TRAINING[day][session][exIdx];
  if(ex&&ex.weighted){
    var totalSets=ex.sets;
    var workingSets=Object.keys(STATE.setsDone[key]).filter(function(k){return k!=="0"&&STATE.setsDone[key][k];}).length;
    var allDone=workingSets>=totalSets;
    recordSetResult(day,session,exIdx,weight,allDone);
  }
  saveStore();
  render();
}

// -- MUSCLE GROUP TRACKING -------------------------------------------------
function getMuscleStats(){
  var counts={chest:0,back:0,shoulders:0,triceps:0,biceps:0,rear_delt:0,quads:0,hamstrings:0,glutes:0,calves:0,core:0};
  var days7=[];
  for(var i=0;i<7;i++){var d=new Date();d.setDate(d.getDate()-i);days7.push(d.toISOString().slice(0,10));}
  days7.forEach(function(dk){
    var dow=new Date(dk).getDay();
    var dayKey=["SUN","MON","TUE","WED","THU","FRI","SAT"][dow];
    var dayData=STATE.days[dk];
    if(!dayData||!TRAINING[dayKey])return;
    TRAINING[dayKey].pm.forEach(function(ex,i){
      if(!ex.weighted)return;
      var done=dayData.training&&dayData.training.pm&&dayData.training.pm[i];
      if(done&&ex.muscle&&counts.hasOwnProperty(ex.muscle))counts[ex.muscle]++;
    });
  });
  return counts;
}

function getDailyNutrition(){
  // Estimate macros from checked meals
  var macroMap={
    m1:{p:45,c:95,f:35},  // Jimmy Joy shake
    m2:{p:55,c:5,f:18},   // beef + veg
    m3:{p:52,c:25,f:16},  // beef + rice
    m4:{p:30,c:45,f:8},   // shake + banana
    m5:{p:68,c:12,f:28},  // beef + eggs
    m6:{p:12,c:6,f:3},    // cottage cheese
  };
  var d=STATE.days[today];
  var p=0,c=0,f=0;
  MEALS.forEach(function(m){

      p+=macroMap[m.id].p;

      f+=macroMap[m.id].f;

  return{protein:p,carbs:c,fat:f,
    targetProtein:230,targetCarbs:260,targetFat:107};
}

}

  const wLost=(STATE.startWeight-STATE.currentWeight).toFixed(1);
  const wToGo=Math.max(0,STATE.currentWeight-67).toFixed(1);
  const bfLost=(STATE.startBF-STATE.currentBF).toFixed(1);
  const musclePct=Math.min(100,(muscle/54)*100);
  const cutPct=Math.max(0,Math.min(100,(1-(STATE.currentWeight-67)/3)*100));
  setHeader("BODY METRICS",`${STATE.currentWeight}kg  - ${STATE.currentBF}% BF`,`${muscle}kg muscle  - ${fat}kg fat`);

  let html=`<div class="section">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${STATE.currentWeight}</div><div class="stat-label">kg now</div></div>

  </div>

  <div class="card">
    <div class="card-label">Cut Progress   67kg / 13.5% BF</div>
    <div style="display:flex;gap:20px;align-items:center;padding:8px 0">
      ${ring(cutPct,60,"#c8f135","weight")}
      ${ring(musclePct,60,"#ff5c35","muscle")}
      <div style="flex:1;font-size:12px;line-height:1.9;color:var(--muted)">
        Lost: <span style="color:#c8f135">${parseFloat(wLost)>0?wLost+"kg":"0kg"}</span><br>
        To go: <span style="color:#ffb347">${wToGo}kg</span><br>
        BF lost: <span style="color:#7eb8f7">${parseFloat(bfLost)>0?bfLost+"%":"0%"}</span><br>

  <div class="card">
    <div class="card-label">Log Today</div>
    <div class="input-row">
      <div class="input-group"><div class="input-label">Weight (kg)</div><input type="number" id="inp-weight" placeholder="${STATE.currentWeight}" step="0.1"></div>

  ${STATE.bodyLog&&STATE.bodyLog.length>0?`<div class="card grey">

    <div class="history-row">

function toggleMealExpand(id){
  const body=document.getElementById('mealdetail-'+id);
  const arrow=document.getElementById('arrow-'+id);
  if(!body)return;
  const open=body.style.display==='none';
  body.style.display=open?'block':'none';
  if(arrow){arrow.classList.toggle('open',open);}
}

function toggle(cat,id){
  if(!isViewingToday())return;
  var _k=todayKey();if(!STATE.days[_k])STATE.days[_k]=emptyDay();
  STATE.days[_k][cat][id]=!STATE.days[today][cat][id];
  saveStore();
  render();
}

function toggleTrain(session,idx){
  if(!isViewingToday())return;
  var _k=todayKey();if(!STATE.days[_k])STATE.days[_k]=emptyDay();
  if(!STATE.days[_k].training[session])STATE.days[_k].training[session]={};
  STATE.days[_k].training[session][idx]=!STATE.days[today].training[session][idx];
  saveStore();
  render();
}

function logBody(){
  const w=document.getElementById("inp-weight")?.value;
  const b=document.getElementById("inp-bf")?.value;
  if(!w&&!b)return;
  const entry={
    date:today,
    weight:w?parseFloat(w):STATE.currentWeight,
    bf:b?parseFloat(b):STATE.currentBF,
  };
  STATE.currentWeight=entry.weight;
  STATE.currentBF=entry.bf;
  STATE.bodyLog=[...(STATE.bodyLog||[]).filter(l=>l.date!==today),entry].sort((a,b)=>a.date.localeCompare(b.date));
  saveStore();
  renderBody();
  setTimeout(initBodyChart,100);
}

function setHeader(label,title,sub){
  const l=document.getElementById("hdr-label");
  const t=document.getElementById("hdr-title");
  const s=document.getElementById("hdr-sub");
  if(l)l.textContent=label;
  if(t)t.textContent=title;
  if(s)s.textContent=sub;
}

function showTab(tab){
  currentTab=tab;
  if(tab!=="today")viewDate=todayKey();
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  document.getElementById("nav-"+tab)?.classList.add("active");
  document.getElementById("app").scrollTop=0;
  render();
  if(tab==="today"||tab==="body")setTimeout(initBodyChart,100);
}

function buildForecast(logs, metric){
  if(logs.length<2)return{labels:[],actual:[],forecast:[]};
  // linear regression on last entries
  var n=logs.length;
  var vals=logs.map(function(l){
    if(metric==="weight")return l.weight;
    if(metric==="bf")return l.bf;
    return parseFloat((l.weight*(1-l.bf/100)).toFixed(1));
  });
  // days since first log
  var t0=new Date(logs[0].date).getTime();
  var xs=logs.map(function(l){return(new Date(l.date).getTime()-t0)/(1000*60*60*24);});
  // least squares slope
  var mx=xs.reduce(function(a,b){return a+b;},0)/n;
  var my=vals.reduce(function(a,b){return a+b;},0)/n;
  var num=0,den=0;
  for(var i=0;i<n;i++){num+=(xs[i]-mx)*(vals[i]-my);den+=(xs[i]-mx)*(xs[i]-mx);}
  var slope=den>0?num/den:0;
  var intercept=my-slope*mx;
  // target values
  var targets={weight:67,bf:13.5,muscle:54};
  var target=targets[metric];
  // forecast 60 days ahead or until target reached
  var lastX=xs[n-1];
  var lastDate=new Date(logs[n-1].date);
  var forecastLabels=[];
  var forecastVals=[];
  var daysToTarget=slope!==0?Math.abs((target-intercept)/slope):999;
  var forecastDays=Math.min(60,Math.round(daysToTarget)+14);
  for(var d=1;d<=forecastDays;d++){
    var fd=new Date(lastDate); fd.setDate(fd.getDate()+d);
    var fLabel=(fd.getMonth()+1)+"/"+fd.getDate();
    var fVal=parseFloat((intercept+slope*(lastX+d)).toFixed(1));
    forecastLabels.push(fLabel);
    forecastVals.push(fVal);
  }
  // actual data labels
  var actualLabels=logs.map(function(l){return l.date.slice(5);});
  var actualVals=vals;
  // days until target
  var daysEst=slope!==0?Math.ceil(Math.abs((target-(intercept+slope*lastX))/slope)):null;
  return{actualLabels:actualLabels,actualVals:actualVals,forecastLabels:forecastLabels,forecastVals:forecastVals,daysEst:daysEst,slope:slope};
}

function isMealSwapRequest(msg){
  var lower=msg.toLowerCase();
  var swapWords=["eat","want","chicken","fish","salmon","tuna","turkey","pasta","rice","swap","change","replace","tomorrow","tonight","different","instead"];
  var matchCount=0;
  swapWords.forEach(function(w){if(lower.indexOf(w)>=0)matchCount++;});
  return matchCount>=2;
}

async function sendCoach(){
  var input=document.getElementById("coach-input");
  var msg=input?input.value.trim():"";
  if(!msg)return;
  input.value="";

  var messagesEl=document.getElementById("coach-messages");
  coachHistory.push({role:"user",content:msg});
  messagesEl.innerHTML+="<div class=\"msg user\">"+msg+"<\/div>";
  var loadId="load-"+Date.now();
  messagesEl.innerHTML+="<div class=\"msg ai loading\" id=\""+loadId+"\">Thinking...</div>";
  messagesEl.scrollTop=messagesEl.scrollHeight;

  var isMealSwap=isMealSwapRequest(msg);
  var targetDate=msg.toLowerCase().indexOf("tomorrow")>=0?getDateStr(1):msg.toLowerCase().indexOf("today")>=0?getDateStr(0):getDateStr(1);

  try{
    var systemPrompt=buildContext();
    if(isMealSwap){
      var swapNote="IMPORTANT: Swap meals 2-6 only (never meal 1 shake). Keep calories near "+getDynamicTarget()+". Return all 6 meals as JSON array. Format: ```json {note:string, meals:[{id,time,name,kcal,items:[{n,q}]}]} ``` Target date: "+targetDate;
      systemPrompt=systemPrompt+"\n\n"+swapNote;
    }

    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1500,
        system:systemPrompt,
        messages:coachHistory.slice(-10),
      })
    });
    var data=await res.json();
    var reply=data.content&&data.content[0]?data.content[0].text:"Sorry, something went wrong.";
    coachHistory.push({role:"assistant",content:reply});

    // Try to apply meal swap if JSON found
    if(isMealSwap){
      var jsonMatch=reply.match(/```json([\s\S]*?)```/);
      if(jsonMatch){
        var applied=parseMealSwap(jsonMatch[1],targetDate);
        var cleanReply=reply.replace(/```json[\s\S]*?```/,"").trim();
        if(applied){
          cleanReply+=" Menu updated for "+targetDate+".";
          document.getElementById(loadId).innerHTML=cleanReply+"<div style=\"margin-top:8px;padding:6px 10px;background:rgba(200,241,53,.1);border-radius:6px;font-size:11px;color:#c8f135;font-family:DM Mono,monospace;\">MENU UPDATED - check Food tab<\/div>";
        } else {
          document.getElementById(loadId).textContent=cleanReply;
        }
      } else {
        document.getElementById(loadId).textContent=reply;
      }
    } else {
      document.getElementById(loadId).textContent=reply;
    }
    document.getElementById(loadId).classList.remove("loading");
  }catch(e){
    document.getElementById(loadId).textContent="Connection error. Try again.";
  }
  messagesEl.scrollTop=messagesEl.scrollHeight;
}

function getMissedItems(dateKey){
  var d=STATE.days[dateKey];
  if(!d)return null;
  var dow=new Date(dateKey).getDay();
  var dayKey=["SUN","MON","TUE","WED","THU","FRI","SAT"][dow];
  var missed={meals:[],supps:[],peptides:[],training:[]};
  MEALS.forEach(function(m){if(!d.meals[m.id])missed.meals.push(m.name);});
  SUPPS.forEach(function(s){if(!d.supps[s.id])missed.supps.push(s.name);});
  PEPTIDES.forEach(function(p){if(!d.peptides[p.id])missed.peptides.push(p.name);});
  var t=TRAINING[dayKey]||{am:[],pm:[]};
  t.am.forEach(function(ex,i){if(!d.training.am||!d.training.am[i])missed.training.push(ex.n);});
  t.pm.forEach(function(ex,i){if(!d.training.pm||!d.training.pm[i])missed.training.push(ex.n);});
  return missed;
}

function getStreaks(){
  var mealStreak=0,trainStreak=0,fullStreak=0;
  var d=new Date();
  for(var i=0;i<30;i++){
    d.setDate(d.getDate()-(i===0?0:1));
    var key=d.toISOString().slice(0,10);
    var day=STATE.days[key];
    if(!day)break;
    var mDone=Object.values(day.meals).filter(Boolean).length;
    var tAm=Object.values(day.training.am||{}).filter(Boolean).length;
    var tPm=Object.values(day.training.pm||{}).filter(Boolean).length;
    var tDone=tAm+tPm;
    var dow=new Date(key).getDay();
    var dk=["SUN","MON","TUE","WED","THU","FRI","SAT"][dow];
    var tTotal=(TRAINING[dk]?TRAINING[dk].am.length+TRAINING[dk].pm.length:0);
    var mealOk=mDone>=4;
    var trainOk=tTotal===0||tDone/tTotal>=0.7;
    if(i===0){
      if(mealOk)mealStreak++;
      if(trainOk)trainStreak++;
      if(mealOk&&trainOk)fullStreak++;
    } else {
      if(mealOk)mealStreak++; else if(mealStreak>0&&i>0)break;
      if(trainOk)trainStreak++; else if(trainStreak>0&&i>0)break;
      if(mealOk&&trainOk)fullStreak++; else if(fullStreak>0&&i>0)break;
    }
  }
  return{meal:mealStreak,train:trainStreak,full:fullStreak};
}

function runWeeklyAutoAdjust(){
  // Only run on Monday and if not already run this week
  if(!isMonday())return;
  var lastAdj=STATE.lastAutoAdjust||"";
  if(lastAdj===todayKey())return;

  var stats=getLastWeekStats();
  if(!stats||stats.days<3)return;

  var currentTarget=STATE.weeklyKcalTarget||2900;
  var newTarget=currentTarget;
  var changes=[];
  var trainingSuggestions=[];
  var mealSuggestions=[];

  // Weight trend adjustment
  var logs=STATE.bodyLog||[];
  if(logs.length>=2){
    var recent=logs.slice(-2);
    var wDiff=recent[1].weight-recent[0].weight;
    var daysBetween=Math.max(1,(new Date(recent[1].date)-new Date(recent[0].date))/(1000*60*60*24));
    var weeklyRate=wDiff/daysBetween*7;
    if(weeklyRate<-1.2){
      newTarget=Math.min(3400,newTarget+200);
      changes.push("Weight loss too fast ("+weeklyRate.toFixed(1)+"kg/wk) - calories +200 kcal to protect muscle");
    } else if(weeklyRate>-0.1&&weeklyRate<0.3){
      newTarget=Math.max(2400,newTarget-150);
      changes.push("Weight stalling ("+weeklyRate.toFixed(1)+"kg/wk) - calories -150 kcal to restart loss");
    } else if(weeklyRate>=-0.9&&weeklyRate<=-0.2){
      changes.push("Weight loss on track ("+weeklyRate.toFixed(1)+"kg/wk) - calories unchanged at "+currentTarget);
    }
  }

  // Training compliance adjustments
  if(stats.avgTrain<0.6){
    trainingSuggestions.push("Training below 60% - consider switching to 5-day split (drop one Legs day)");
    if(newTarget===currentTarget){newTarget=Math.max(2400,newTarget-100);changes.push("Low training compliance - calories -100 kcal");}
  } else if(stats.avgTrain>=0.85){
    trainingSuggestions.push("Strong training week - add 2.5kg to main compound lifts (bench, squat, deadlift, row)");
  }

  // Meal compliance adjustments
  if(stats.avgMeal<0.7){
    mealSuggestions.push("Meal compliance below 70% - Meal 4 (Pre-PM) most often skipped. Consider replacing with 2 boiled eggs + banana for simplicity.");
    if(newTarget===currentTarget){newTarget=Math.max(2400,newTarget-50);changes.push("Low meal compliance - target -50 kcal to match actual intake");}
  } else if(stats.avgMeal>=0.95){
    mealSuggestions.push("Perfect meal compliance - consider adding 50g extra beef to Meal 5 for additional protein.");
  }

  // Save adjustments
  STATE.weeklyKcalTarget=newTarget;
  STATE.lastAutoAdjust=todayKey();
  STATE.lastAdjustChanges=changes;
  STATE.lastAdjustTraining=trainingSuggestions;
  STATE.lastAdjustMeals=mealSuggestions;
  STATE.weeklyDismissed=false;
  weeklyDismissed=false;
  saveStore();
}

function parseMealSwap(jsonStr, targetDate){
  try{
    var clean=jsonStr.replace(/```json|```/g,"").trim();

    if(data.meals&&Array.isArray(data.meals)){
      applyMealOverride(targetDate, data.meals, data.note||"Custom menu");

  html+="<button onclick=\"shiftCalMonth(-1)\" style=\"background:none;border:1px solid #252525;border-radius:6px;color:#555;font-size:16px;width:30px;height:30px;cursor:pointer;\">&lsaquo;<\/button>";
  html+="<span style=\"font-family:Bebas Neue,sans-serif;font-size:18px;letter-spacing:2px;color:#f5f5f5;\">"+firstDay.toLocaleDateString("nl-BE",{month:"long",year:"numeric"}).toUpperCase()+"<\/span>";
  html+="<button onclick=\"shiftCalMonth(1)\" style=\"background:none;border:1px solid #252525;border-radius:6px;color:#555;font-size:16px;width:30px;height:30px;cursor:pointer;\">&rsaquo;<\/button>";
  html+="<\/div>";
  html+="<div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:3px;\">";
  ["MA","DI","WO","DO","VR","ZA","ZO"].forEach(function(l){
    html+="<div style=\"font-family:DM Mono,monospace;font-size:9px;color:#555;text-align:center;padding-bottom:4px;\">"+l+"<\/div>";
  });
  for(var i=0;i<startOffset;i++) html+="<div><\/div>";
  for(var day=1;day<=lastDay.getDate();day++){
    var ds=year+"-"+String(month+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
    var score=getDayScore(ds);
    var isTod=ds===todayStr, isView=ds===viewDate, isFut=ds>todayStr;
    var bg=isFut?"transparent":score?dayScoreColor(score)+"22":"#1a1a1a";
    var border=isView?"2px solid #7eb8f7":isTod?"1px solid #c8f135":"1px solid transparent";
    var numColor=isFut?"#333":isTod?"#c8f135":"#aaa";
    html+="<div onclick=\"viewDate='"+ds+"';currentTab='today';render();\" style=\"aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:"+bg+";border:"+border+";position:relative;\">";
    html+="<span style=\"font-family:DM Mono,monospace;font-size:10px;color:"+numColor+"\">"+day+"<\/span>";
    if(score&&!isFut){
      html+="<div style=\"width:4px;height:4px;border-radius:50%;background:"+dayScoreColor(score)+";margin-top:1px;\">&nbsp;<\/div>";
    }
    html+="<\/div>";
  }
  html+="<\/div>";
  html+="<div style=\"display:flex;gap:10px;margin-top:8px;padding-top:6px;border-top:1px solid #1a1a1a;\">";
  [["#c8f135","85%+"],["#ffb347","50%+"],["#ff5c35","<50%"]].forEach(function(x){
    html+="<div style=\"display:flex;align-items:center;gap:4px;\"><div style=\"width:6px;height:6px;border-radius:50%;background:"+x[0]+"\"><\/div><span style=\"font-family:DM Mono,monospace;font-size:9px;color:#555;\">"+x[1]+"<\/span><\/div>";
  });
  html+="<\/div><\/div>";
  return html;
}

function render(){
  if(currentTab==="today")renderToday();
  else if(currentTab==="food")renderFood();
  else if(currentTab==="train")renderTrain();
  else if(currentTab==="supps")renderSupps();
  else if(currentTab==="body")renderBody();
  else if(currentTab==="schedule")renderSchedule();
  else if(currentTab==="missed")renderMissedTab();
}

function renderMissedTab(){
  setHeader("MISSED & STREAKS","LAST 7 DAYS","Track what you skipped");
  document.getElementById("app").innerHTML="<div class=\"section\">"+renderMissedTracker()+"</div>";
}

// --- INIT ---------------------------------------------------------------------
// Inject sticky header into body (outside #app so it doesn't get wiped on render)
document.body.insertAdjacentHTML("afterbegin",`
<div class="header" id="main-header">
  <div class="header-label" id="hdr-label">PERFORMANCE BLUEPRINT</div>
  <div class="header-title" id="hdr-title">Loading...</div>
  <div class="header-sub" id="hdr-sub"></div>
</div>`);

render();
// init chart after DOM painted
setTimeout(initBodyChart, 100);
</script>
</body>
