<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Blueprint</title>
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="mask-icon" href="/icon.svg" color="#c8f135">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--dark:#111;--card:#161616;--border:#252525;--border2:#1e1e1e;
  --accent:#c8f135;--red:#ff5c35;--blue:#7eb8f7;--orange:#ffb347;--purple:#b464ff;
  --text:#e8e8e8;--muted:#555;--white:#f5f5f5;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;overscroll-behavior:none;}
body{display:flex;flex-direction:column;overflow:hidden;}

/* SCROLL AREA */
#app{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px;padding-top:110px;}

/* HEADER */
.header{padding:36px 20px 12px;border-bottom:1px solid var(--border);background:var(--bg);position:fixed;top:0;left:0;right:0;z-index:50;}
.header-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:4px;}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--white);line-height:1;}
.header-sub{font-size:10px;color:var(--muted);margin-top:2px;}

/* NAV */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
nav button{flex:1;background:none;border:none;padding:10px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);transition:color .2s;}
nav button.active{color:var(--accent);}
nav button svg{width:20px;height:20px;stroke-width:1.5;}

/* SECTION */
.section{padding:16px 16px 0;}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:10px 0 0 10px;}
.card.red::before{background:var(--red);}
.card.blue::before{background:var(--blue);}
.card.orange::before{background:var(--orange);}
.card.purple::before{background:var(--purple);}
.card.grey::before{background:var(--muted);}
.card-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}

/* CHECK ROW */
.check-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border2);cursor:pointer;user-select:none;}
.check-row:last-child{border-bottom:none;}
.check-row.done .check-label{text-decoration:line-through;color:var(--muted);}
.checkbox{width:22px;height:22px;border-radius:5px;border:2px solid #333;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.checkbox.checked{background:var(--accent);border-color:var(--accent);}
.checkbox.checked svg{display:block;}
.checkbox svg{display:none;width:12px;height:12px;stroke:#0a0a0a;stroke-width:3;fill:none;}
.check-label{flex:1;font-size:13px;color:var(--text);}
.check-right{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--accent);}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-top:2px;}

/* RINGS ROW */
.rings-row{display:flex;justify-content:space-around;align-items:center;padding:16px 0;border-bottom:1px solid var(--border2);margin-bottom:14px;}
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.ring-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}

/* PROGRESS BAR */
.progress-bar{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;margin:8px 0;}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease;background:var(--accent);}
.progress-fill.red{background:var(--red);}
.progress-fill.blue{background:var(--blue);}

/* CALORIE DISPLAY */
.kcal-display{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.kcal-big{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);letter-spacing:1px;}
.kcal-target{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}

/* ADJUST BANNER */
.adjust-over{background:rgba(200,241,53,.07);border:1px solid rgba(200,241,53,.25);border-radius:8px;padding:10px 14px;margin-top:10px;font-size:12px;color:var(--accent);line-height:1.5;}
.adjust-under{background:rgba(255,92,53,.07);border:1px solid rgba(255,92,53,.25);border-radius:8px;padding:10px 14px;margin-top:10px;font-size:12px;color:var(--red);line-height:1.5;}

/* MACRO ROW */
.macro-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.macro-pill{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;text-align:center;flex:1;min-width:64px;}
.macro-val{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.macro-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}

/* MEAL CARD */
.meal-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.meal-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border2);background:rgba(200,241,53,.03);}
.meal-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:2px;}
.meal-name{font-size:14px;font-weight:500;color:var(--white);}
.meal-kcal{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);letter-spacing:1px;}
.meal-done .meal-kcal{color:var(--muted);}
.meal-done .meal-name{color:var(--muted);}
.meal-body{padding:10px 14px;}
.meal-item{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border2);font-size:12px;}
.meal-item:last-child{border-bottom:none;}
.meal-item span{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.meal-check-btn{width:26px;height:26px;border-radius:6px;border:2px solid #333;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;}
.meal-check-btn.checked{background:var(--accent);border-color:var(--accent);}
.meal-check-btn.checked svg{display:block;}
.meal-check-btn svg{display:none;width:13px;height:13px;stroke:#0a0a0a;stroke-width:3;fill:none;}

/* DAY PILLS */
.day-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.day-pill{padding:6px 12px;border-radius:20px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;background:var(--card);color:var(--muted);border:1px solid var(--border);white-space:nowrap;cursor:pointer;}
.day-pill.today{background:var(--accent);color:#0a0a0a;border-color:var(--accent);}

/* INPUT */
.input-group{margin-bottom:12px;}
.input-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
input[type=number],input[type=text]{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:16px;padding:12px 14px;width:100%;outline:none;font-family:'DM Sans',sans-serif;-webkit-appearance:none;}
input:focus{border-color:var(--accent);}
.input-row{display:flex;gap:10px;}
.input-row .input-group{flex:1;}

/* BUTTON */
.btn{background:var(--accent);color:#0a0a0a;border:none;border-radius:8px;padding:13px 20px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;margin-top:4px;letter-spacing:.5px;}

/* HISTORY ROW */
.history-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border2);font-size:12px;}
.history-row:last-child{border-bottom:none;}
.history-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}

/* PHASE BANNER */
.phase-banner{background:var(--accent);color:#0a0a0a;border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.phase-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;}
.phase-detail{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;}

/* SESSION TITLE */
.session-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:10px 0 6px;border-bottom:1px solid var(--border2);margin-bottom:6px;}

/* SUPP TAG */
.supp-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:20px;white-space:nowrap;}
.tag-morning{background:rgba(200,241,53,.1);color:var(--accent);}
.tag-pre{background:rgba(255,179,71,.1);color:var(--orange);}
.tag-post{background:rgba(255,92,53,.1);color:var(--red);}
.tag-bed{background:rgba(180,100,255,.1);color:var(--purple);}
.tag-eve{background:rgba(126,184,247,.1);color:var(--blue);}

/* WEEKLY BANNER */
.weekly-banner{background:rgba(200,241,53,.07);border:1px solid rgba(200,241,53,.25);border-radius:10px;padding:14px 16px;margin-bottom:12px;}
.weekly-banner.dismiss{display:none;}
.weekly-title{font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:2px;color:var(--accent);margin-bottom:8px;}
.weekly-item{font-size:12px;color:var(--text);padding:4px 0;border-bottom:1px solid var(--border2);line-height:1.5;}
.weekly-item:last-child{border-bottom:none;}
.weekly-btns{display:flex;gap:8px;margin-top:12px;}
.weekly-btn-accept{flex:1;background:var(--accent);color:#0a0a0a;border:none;border-radius:6px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.weekly-btn-dismiss{flex:1;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:13px;cursor:pointer;font-family:"DM Sans",sans-serif;}

/* GRAPH */
.graph-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;padding:14px 16px;margin-bottom:12px;}
.graph-tabs{display:flex;gap:6px;margin-bottom:12px;}
.graph-tab{font-family:"DM Mono",monospace;font-size:10px;letter-spacing:1px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--muted);cursor:pointer;background:none;}
.graph-tab.active{background:var(--accent);color:#0a0a0a;border-color:var(--accent);}

/* AI COACH */
.coach-fab{position:fixed;bottom:80px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:200;box-shadow:0 4px 20px rgba(200,241,53,.4);transition:transform .2s;}
.coach-fab:active{transform:scale(.92);}
.coach-panel{position:fixed;bottom:0;left:0;right:0;height:75vh;background:#111;border-top:1px solid var(--border);border-radius:20px 20px 0 0;z-index:300;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s ease;}
.coach-panel.open{transform:translateY(0);}
.coach-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.coach-title{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:2px;color:var(--white);}
.coach-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px;}
.coach-messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;}
.msg.user{background:var(--accent);color:#0a0a0a;align-self:flex-end;border-radius:12px 12px 2px 12px;}
.msg.ai{background:var(--card);color:var(--text);align-self:flex-start;border-radius:12px 12px 12px 2px;border:1px solid var(--border);}
.msg.ai.loading{color:var(--muted);font-style:italic;}
.msg.ai p{margin:4px 0;line-height:1.5;}
.msg.ai p:first-child{margin-top:0;}
.msg.ai p:last-child{margin-bottom:0;}
.msg.ai .coach-h{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.5px;color:var(--accent);margin:8px 0 4px;}
.msg.ai .coach-h:first-child{margin-top:0;}
.msg.ai ul,.msg.ai ol{padding-left:18px;margin:4px 0;}
.msg.ai li{margin:2px 0;line-height:1.45;}
.msg.ai li::marker{color:var(--accent);}
.msg.ai strong{color:var(--white);font-weight:600;}
.msg.ai em{color:var(--accent);font-style:normal;}
.msg.ai code{background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);}
.msg.ai pre{background:rgba(0,0,0,.3);padding:8px;border-radius:6px;overflow-x:auto;margin:6px 0;}
.msg.ai pre code{background:none;padding:0;font-size:11px;color:var(--text);}
.msg.ai .coach-chart{background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:8px;padding:10px;margin:8px 0;height:160px;position:relative;}
.msg.ai .coach-chart-err{color:var(--muted);font-size:11px;font-family:'DM Mono',monospace;text-align:center;padding:10px;}
.msg.ai .coach-menu-applied{margin-top:8px;padding:6px 10px;background:rgba(200,241,53,.1);border-radius:6px;font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;letter-spacing:1px;}
.coach-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:calc(12px + env(safe-area-inset-bottom));}
.coach-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:14px;padding:10px 16px;outline:none;font-family:"DM Sans",sans-serif;}
.coach-input:focus{border-color:var(--accent);}
.coach-send{background:var(--accent);border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.coach-send svg{width:16px;height:16px;stroke:#0a0a0a;fill:none;stroke-width:2.5;}

/* COACH OVERLAY */
.coach-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299;display:none;}
.coach-overlay.open{display:block;}

/* EXPANDABLE MEALS *//* EXPANDABLE MEALS */
.meal-expand-row{border-bottom:1px solid var(--border2);}
.meal-expand-row:last-child{border-bottom:none;}
.meal-expand-row.done .meal-expand-name{color:var(--muted);text-decoration:line-through;}
.meal-expand-row.done .meal-expand-kcal{color:var(--muted);}
.meal-expand-header{display:flex;align-items:center;gap:10px;padding:10px 0;cursor:pointer;user-select:none;}
.meal-expand-info{flex:1;display:flex;flex-direction:column;gap:1px;}
.meal-expand-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:1px;}
.meal-expand-name{font-size:13px;color:var(--text);}
.meal-expand-kcal{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;}
.meal-expand-arrow{font-size:20px;color:var(--muted);width:16px;text-align:center;transition:transform .2s;line-height:1;font-weight:300;}
.meal-expand-arrow.open{transform:rotate(90deg);color:var(--accent);}
.meal-expand-body{background:rgba(255,255,255,.02);border-radius:8px;margin:0 0 10px 32px;overflow:hidden;}
.meal-expand-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border2);font-size:13px;color:var(--text);}
.meal-expand-item:last-child{border-bottom:none;}
.meal-expand-qty{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);}
.meal-expand-done-btn{padding:10px 12px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border-top:1px solid var(--border2);}

/* TRAINING MODULE */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.ex-header{padding:12px 14px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;}
.ex-name{font-size:14px;font-weight:500;color:var(--white);}
.ex-meta{display:flex;gap:8px;align-items:center;}
.ex-muscle{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:1px;padding:2px 8px;border-radius:20px;background:rgba(200,241,53,.1);color:var(--accent);}
.ex-sets-area{padding:12px 14px;}
.set-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2);}
.set-row:last-child{border-bottom:none;}
.set-num{font-family:"DM Mono",monospace;font-size:10px;color:var(--muted);width:40px;flex-shrink:0;}
.set-num.warmup{color:#ffb347;}
.set-reps{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);width:50px;flex-shrink:0;}
.set-weight-input{background:#1e1e1e;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;padding:6px 10px;width:70px;text-align:center;font-family:"DM Sans",sans-serif;outline:none;}
.set-weight-input:focus{border-color:var(--accent);}
.set-weight-input.warmup{border-color:rgba(255,179,71,.3);color:#ffb347;}
.set-done-btn{width:32px;height:32px;border-radius:50%;border:2px solid #333;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.set-done-btn.done{background:var(--accent);border-color:var(--accent);}
.set-done-btn svg{width:14px;height:14px;stroke:#0a0a0a;fill:none;stroke-width:3;display:none;}
.set-done-btn.done svg{display:block;}
.set-suggest{font-size:11px;color:var(--muted);flex:1;}
.set-suggest.changed{color:var(--accent);font-weight:600;}
.ex-footer{padding:8px 14px;background:rgba(255,255,255,.02);font-size:11px;color:var(--muted);display:flex;justify-content:space-between;}
.ex-footer.progressed{color:var(--accent);}

/* NUTRITION GRAPH */
.graph-metric-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.metric-pill{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:1px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--muted);cursor:pointer;background:none;}
.metric-pill.active{background:var(--accent);color:#0a0a0a;border-color:var(--accent);}

/* MUSCLE MAP */
.muscle-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.muscle-cell{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 6px;text-align:center;}
.muscle-cell.hit-high{border-color:#c8f135;background:rgba(200,241,53,.1);}
.muscle-cell.hit-med{border-color:#ffb347;background:rgba(255,179,71,.08);}
.muscle-cell.hit-low{border-color:#ff5c35;background:rgba(255,92,53,.06);}
.muscle-name{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.muscle-count{font-family:"Bebas Neue",sans-serif;font-size:20px;color:var(--white);line-height:1;}

/* DIFF HIGHLIGHT */
.diff-over{color:#ff5c35 !important;font-weight:700;}
.diff-under{color:#ffb347 !important;font-weight:700;}
.diff-ok{color:#c8f135 !important;}

/* AUTH / ONBOARDING -------------------------------------------------------- */
body.auth-mode #app, body.auth-mode nav, body.auth-mode .coach-fab, body.auth-mode .coach-panel, body.auth-mode .coach-overlay, body.auth-mode #main-header{display:none !important;}
body.auth-mode{overflow:auto;}
.auth-screen{position:fixed;inset:0;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:500;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
.auth-inner{max-width:440px;margin:0 auto;padding:36px 20px 40px;}
.auth-inner.onb-inner{padding-bottom:60px;}
.auth-logo{width:72px;height:72px;margin:0 auto 14px;}
.auth-logo svg{width:100%;height:100%;display:block;}
.auth-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;color:var(--white);text-align:center;}
.auth-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;text-align:center;margin-bottom:28px;}
.auth-section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:18px 0 10px;}
.auth-profiles{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.auth-profile{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;transition:border-color .15s,background .15s;}
.auth-profile:hover,.auth-profile:active{border-color:var(--accent);background:rgba(200,241,53,.04);}
.auth-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#0a0a0a;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;flex-shrink:0;letter-spacing:1px;}
.auth-profile-name{flex:1;}
.auth-lock{font-size:12px;color:var(--muted);}
.auth-pw-prompt{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:10px;}
.auth-pw-row{display:flex;gap:8px;margin-top:6px;align-items:center;}
.auth-pw-row input{flex:1;}
.auth-optional{color:var(--muted);text-transform:none;letter-spacing:0;font-weight:300;}
.auth-err{color:var(--red);font-size:12px;margin-top:8px;min-height:16px;}
.auth-note{font-size:11px;color:var(--muted);text-align:center;margin-top:28px;line-height:1.5;}
.auth-link{background:none;border:none;color:var(--accent);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;padding:8px 0;margin-top:6px;}
.auth-link.danger-link{color:var(--muted);display:block;width:100%;text-align:center;margin-top:14px;}

/* onboarding items */
.phase-row{display:flex;gap:6px;margin-bottom:14px;}
.phase-pill{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--muted);cursor:pointer;}
.phase-pill.active{background:var(--accent);color:#0a0a0a;border-color:var(--accent);}
.onb-item{display:grid;grid-template-columns:1fr 1fr auto auto;gap:6px;align-items:center;margin-bottom:8px;}
.onb-item input,.onb-item select{background:#1e1e1e;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:9px 10px;outline:none;font-family:'DM Sans',sans-serif;min-width:0;}
.onb-item input:focus,.onb-item select:focus{border-color:var(--accent);}
.onb-item select{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;}
.onb-del{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);width:32px;height:34px;font-size:18px;line-height:1;cursor:pointer;}
.onb-del:hover{color:var(--red);border-color:var(--red);}

/* header logout button */
.header-logout{position:absolute;top:38px;right:14px;background:transparent;border:1px solid var(--border);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;transition:color .15s,border-color .15s;}
.header-logout:hover,.header-logout:active{color:var(--accent);border-color:var(--accent);}
.header-logout svg{width:15px;height:15px;}

/* SETTINGS */
.settings-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border2);}
.settings-row:last-of-type{border-bottom:none;}
.settings-toggle{width:40px;height:22px;border-radius:11px;background:#333;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
.settings-toggle.on{background:var(--accent);}
.settings-toggle-dot{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:transform .2s;}
.settings-toggle.on .settings-toggle-dot{transform:translateX(18px);}
.settings-item-info{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0;}
.settings-item-name{font-size:13px;color:var(--text);}
.settings-item-dose{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.settings-del{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);width:28px;height:28px;font-size:16px;line-height:1;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.settings-del:hover,.settings-del:active{color:var(--red);border-color:var(--red);}
.settings-add-row{display:flex;gap:6px;align-items:center;padding:10px 0 4px;border-top:1px solid var(--border2);margin-top:4px;}
.settings-add-input{flex:1;background:#1e1e1e;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:8px;outline:none;font-family:'DM Sans',sans-serif;min-width:0;}
.settings-add-input:focus{border-color:var(--accent);}
.settings-add-select{background:#1e1e1e;border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:10px;padding:8px 4px;outline:none;min-width:0;}
.settings-add-btn{background:var(--accent);color:#0a0a0a;border:none;border-radius:6px;width:34px;height:34px;font-size:20px;font-weight:700;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.settings-train-day{border-bottom:1px solid var(--border2);}
.settings-train-day:last-child{border-bottom:none;}
.settings-train-header{display:flex;align-items:center;gap:8px;padding:10px 0;cursor:pointer;user-select:none;}
.settings-train-day-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--white);width:40px;flex-shrink:0;}
.settings-train-focus{flex:1;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.settings-train-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);background:rgba(200,241,53,.1);padding:2px 8px;border-radius:10px;}
.settings-train-body{padding:0 0 10px 8px;}
.settings-train-session-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:10px 0 4px;}
.settings-train-ex{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2);}
.settings-train-ex:last-of-type{border-bottom:none;}
.settings-train-ex .settings-item-name{flex:1;font-size:12px;}
.settings-train-ex .settings-item-dose{font-size:10px;flex-shrink:0;}
.settings-train-focus-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.settings-train-focus-row .input-label{flex-shrink:0;margin-bottom:0;}
.settings-train-focus-row input{flex:1;}
.settings-ai-wizard{padding:14px 0 4px;border-top:1px solid var(--border2);margin-top:8px;}
.settings-ai-wizard .phase-row{flex-wrap:wrap;}
.settings-ai-wizard .phase-pill{min-width:auto;flex:0 1 auto;padding:8px 12px;font-size:10px;}

/* TRAIN CALENDAR */
.train-cal{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:10px;padding:12px 10px;margin-bottom:12px;}
.train-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.train-cal-month{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--white);}
.train-cal-nav{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:16px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.train-cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.train-cal-day{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.train-cal-day:active{transform:scale(.95);}
.train-cal-day.selected{border-color:var(--accent);background:rgba(200,241,53,.08);}
.train-cal-day.today .train-cal-date{color:var(--accent);font-weight:700;}
.train-cal-day.rest{opacity:.45;}
.train-cal-dow{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.train-cal-date{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--white);line-height:1;}
.train-cal-focus{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.5px;color:var(--muted);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}

/* MEAL STATUS */
.meal-expand-row.missed .meal-expand-name{color:var(--red);text-decoration:line-through;}
.meal-expand-row.missed .meal-expand-kcal{color:var(--red);text-decoration:line-through;}
.meal-expand-row.replaced .meal-expand-name{color:var(--blue);}
.meal-expand-row.replaced .meal-expand-kcal{color:var(--blue);}
.meal-status-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;padding:2px 8px;border-radius:20px;margin-left:6px;}
.tag-skipped{background:rgba(255,92,53,.1);color:var(--red);}
.tag-swapped{background:rgba(126,184,247,.1);color:var(--blue);}
.meal-actions{display:flex;gap:6px;padding:10px 12px;border-top:1px solid var(--border2);}
.meal-action{flex:1;padding:9px 6px;border-radius:6px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-align:center;border:1px solid var(--border);}
.meal-action.eaten{background:rgba(200,241,53,.1);color:var(--accent);border-color:rgba(200,241,53,.3);}
.meal-action.missed-btn{background:rgba(255,92,53,.1);color:var(--red);border-color:rgba(255,92,53,.3);}
.meal-action.swap-btn{background:rgba(126,184,247,.1);color:var(--blue);border-color:rgba(126,184,247,.3);}
.meal-action.reset-btn{background:transparent;color:var(--muted);border-color:var(--border);}
.meal-replace-form{padding:10px 12px;border-top:1px solid var(--border2);display:flex;flex-direction:column;gap:8px;}
.meal-replace-form input{background:#1e1e1e;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:9px 10px;outline:none;font-family:'DM Sans',sans-serif;}
.meal-replace-form input:focus{border-color:var(--accent);}
.meal-replace-form .input-row{display:flex;gap:8px;}
.meal-replace-form .input-row input{flex:1;}
.meal-replace-form button{background:var(--blue);color:#0a0a0a;border:none;border-radius:6px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.add-meal-btn{background:var(--accent);color:#0a0a0a;border:none;border-radius:6px;width:28px;height:28px;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0;}
.meal-replaced-info{padding:8px 12px;background:rgba(126,184,247,.05);font-size:12px;color:var(--blue);}
.rep-status{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.5px;min-height:16px;color:var(--muted);}
.rep-status.rep-loading{color:var(--accent);}
.rep-status.rep-error{color:var(--red);}
.meal-replace-form button:disabled{opacity:.5;cursor:wait;}
.meal-redistribute{background:rgba(255,179,71,.07);border:1px solid rgba(255,179,71,.25);border-radius:8px;padding:10px 14px;margin-top:10px;font-size:12px;color:var(--orange);line-height:1.5;}

/* Food tab meal status */
.meal-card.meal-missed .meal-name,.meal-card.meal-missed .meal-kcal{color:var(--red) !important;text-decoration:line-through;}
.meal-card.meal-replaced .meal-name{color:var(--blue) !important;}
.meal-card.meal-replaced .meal-kcal{color:var(--blue) !important;}
</style>

// NOTE: device-local profiles, NOT secure authentication. Everything lives in
// this browser's localStorage. Use it to keep household profiles separate, not
// to protect anything sensitive.
const ACCOUNTS_KEY="blueprint_accounts";
const SESSION_KEY="blueprint_session";
function hashPw(pw,salt){
  const s=salt+"|"+(pw||"");
  let h1=0x811c9dc5>>>0,h2=0xdeadbeef>>>0;
  for(let i=0;i<s.length;i++){
    const c=s.charCodeAt(i);
    h1=Math.imul(h1^c,0x01000193);
    h2=Math.imul(h2^c,0x85ebca6b);
  }
  return(h1>>>0).toString(16).padStart(8,"0")+(h2>>>0).toString(16).padStart(8,"0");
}
function loadAccounts(){try{return JSON.parse(localStorage.getItem(ACCOUNTS_KEY))||[];}catch{return[];}}
function saveAccounts(a){localStorage.setItem(ACCOUNTS_KEY,JSON.stringify(a));}
function getSession(){return localStorage.getItem(SESSION_KEY);}
function setSession(id){if(id)localStorage.setItem(SESSION_KEY,id);else localStorage.removeItem(SESSION_KEY);}
function currentUserId(){return getSession();}
function currentAccount(){const id=currentUserId();if(!id)return null;return loadAccounts().find(a=>a.id===id)||null;}
function createAccount(displayName,password){
  const accounts=loadAccounts();
  const name=(displayName||"").trim();
  if(!name)throw new Error("Name is required");
  const handle=name.toLowerCase();
  if(accounts.some(a=>a.handle===handle))throw new Error("That name is already taken on this device");
  const id="u_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const salt=Math.random().toString(36).slice(2,10);
  const acc={id,handle,name,salt,passHash:hashPw(password||"",salt),hasPassword:!!(password&&password.length),createdAt:new Date().toISOString()};
  accounts.push(acc);
  saveAccounts(accounts);
  return acc;
}
function authenticate(handle,password){
  const a=loadAccounts().find(x=>x.handle===(handle||"").trim().toLowerCase());
  if(!a)return null;
  if(a.hasPassword&&hashPw(password||"",a.salt)!==a.passHash)return null;
  return a;
}
function logout(){setSession(null);location.reload();}

// -- WEEKLY ANALYSIS ------------------------------------------------------
function getLastWeekStats(){
  const days=[];
  for(let i=1;i<=7;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    if(STATE.days[key])days.push({key,data:STATE.days[key]});
  }
  if(days.length<3)return null;
  const mealCompletion=days.map(d=>{
    const total=Object.keys(d.data.meals).length;
    const done=Object.values(d.data.meals).filter(Boolean).length;
    return done/total;
  });
  const trainCompletion=days.map(d=>{
    const am=Object.values(d.data.training?.am||{}).filter(Boolean).length;
    const pm=Object.values(d.data.training?.pm||{}).filter(Boolean).length;
    const dow=new Date(d.key).getDay();
    const dayKey=['SUN','MON','TUE','WED','THU','FRI','SAT'][dow];
    const total=(TRAINING[dayKey]?.am?.length||0)+(TRAINING[dayKey]?.pm?.length||0);
    return total>0?(am+pm)/total:1;
  });
  const avgMeal=mealCompletion.reduce((a,b)=>a+b,0)/mealCompletion.length;
  const avgTrain=trainCompletion.reduce((a,b)=>a+b,0)/trainCompletion.length;
  return{avgMeal,avgTrain,days:days.length};
}

function getWeeklySuggestions(){
  const stats=getLastWeekStats();
  if(!stats)return null;
  const suggestions=[];
  if(stats.avgMeal<0.7)suggestions.push("You completed <70% of meals last week. Consider prepping more on Sunday to avoid skipping.");
  if(stats.avgMeal>=0.9)suggestions.push("Excellent meal compliance last week (90%+). Stay consistent.");
  if(stats.avgTrain<0.6)suggestions.push("Training was below 60% last week. Consider dropping to 5 days if schedule is tight.");
  if(stats.avgTrain>=0.85)suggestions.push("Strong training week. Progressive overload - add 2.5kg on your main lifts this week.");
  const recentLog=STATE.bodyLog?.slice(-2)||[];
  if(recentLog.length===2){
    const wDiff=recentLog[1].weight-recentLog[0].weight;
    if(wDiff<-1)suggestions.push(`You lost ${Math.abs(wDiff).toFixed(1)}kg fast. Risk of muscle loss - consider adding 200 kcal this week.`);
    if(wDiff>0.5)suggestions.push(`Weight up ${wDiff.toFixed(1)}kg. If not intentional, reduce Meal 3 rice by 50g.`);
    if(wDiff>=-0.8&&wDiff<=-0.2)suggestions.push(`Weight loss on track (${Math.abs(wDiff).toFixed(1)}kg). Keep current calories.`);
  }
  return suggestions.length>0?suggestions:["Great week overall. Keep the current plan."];
}

// --- RINGS --------------------------------------------------------------------
function ring(pct,size,color,label){
  const stroke=size<60?4:5,r=(size-stroke*2)/2,circ=2*Math.PI*r;
  const offset=circ-(Math.min(100,pct)/100)*circ;
  return`<div class="ring-wrap">
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e1e1e" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}"
        stroke-width="${stroke}" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
        stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .4s ease"/>
      <text x="${size/2}" y="${size/2}" text-anchor="middle" dominant-baseline="middle"
        fill="#f5f5f5" font-size="${size<60?11:13}" font-family="'Bebas Neue',sans-serif" letter-spacing="0.5">${Math.round(pct)}%</text>
    </svg>
    <span class="ring-label">${label}</span>
  </div>`;
}

// --- CALCULATIONS --------------------------------------------------------------
function getDynamicTarget(){
  return STATE.weeklyKcalTarget||2900;
}

function getTrainingAdjustment(){
  var d=STATE.days[today];
  var hour=new Date().getHours();
  var amEx=TRAINING[DOW]?TRAINING[DOW].am.length:0;
  var pmEx=TRAINING[DOW]?TRAINING[DOW].pm.length:0;
  var amDone=Object.values(d.training.am||{}).filter(Boolean).length;
  var pmDone=Object.values(d.training.pm||{}).filter(Boolean).length;
  var adj=0;
  var reasons=[];
  if(hour>=10&&amEx>0&&amDone===0){adj-=150;reasons.push("AM session missed: -150 kcal");}
  if(hour>=20&&pmEx>0&&pmDone===0){adj-=300;reasons.push("PM session missed: -300 kcal");}
  if(amEx>0&&amDone>0&&amDone<amEx){adj-=75;reasons.push("AM partial: -75 kcal");}
  if(pmEx>0&&pmDone>0&&pmDone<pmEx){adj-=150;reasons.push("PM partial: -150 kcal");}
  return{adj:adj,reasons:reasons};
}

function calcStats(){
  var d=STATE.days[today];
  var todayMeals=getTodaysMeals();
  var kcalDone=0, mealsDone=0, mealsMissed=0, mealsRemaining=0, kcalRemaining=0;
  todayMeals.forEach(function(m){
    var st=mealStatus(m.id);
    if(st==="done"){kcalDone+=m.kcal;mealsDone++;}
    else if(st==="replaced"){var v=d.meals[m.id];kcalDone+=(v.kcal||0);mealsDone++;}
    else if(st==="missed"){mealsMissed++;}
    else{mealsRemaining++;kcalRemaining+=m.kcal;}
  });
  var activeSupps=getActiveSupps();
  var activePeps=getActivePeptides();
  var suppsDone=activeSupps.filter(function(s){return d.supps[s.id];}).length;
  var pepsDone=activePeps.filter(function(p){return d.peptides[p.id];}).length;
  var amEx=TRAINING[DOW]?TRAINING[DOW].am.length:0;
  var pmEx=TRAINING[DOW]?TRAINING[DOW].pm.length:0;
  var totalEx=amEx+pmEx;
  var trainDone=Object.values(d.training.am||{}).filter(Boolean).length+Object.values(d.training.pm||{}).filter(Boolean).length;
  var baseTarget=getDynamicTarget();
  var trainAdj=getTrainingAdjustment();
  var kcalTarget=baseTarget+trainAdj.adj;
  return{
    kcalDone:kcalDone,
    kcalTarget:kcalTarget,
    baseTarget:baseTarget,
    trainAdj:trainAdj,
    mealPct:(mealsDone/todayMeals.length)*100,
    suppPct:activeSupps.length>0?(suppsDone/activeSupps.length)*100:100,
    pepPct:activePeps.length>0?(pepsDone/activePeps.length)*100:100,
    trainPct:totalEx>0?(trainDone/totalEx)*100:0,
    mealsDone:mealsDone,suppsDone:suppsDone,pepsDone:pepsDone,suppsTotal:activeSupps.length,pepsTotal:activePeps.length,trainDone:trainDone,totalEx:totalEx,
    mealsMissed:mealsMissed,mealsRemaining:mealsRemaining,kcalRemaining:kcalRemaining,totalMeals:todayMeals.length,
    muscleMass:(STATE.currentWeight*(1-STATE.currentBF/100)).toFixed(1),
    fatMass:(STATE.currentWeight*STATE.currentBF/100).toFixed(1),
  };
}

// -- EXERCISE KEY ----------------------------------------------------------
function exKey(day, session, idx){ return "ex_"+day+"_"+session+"_"+idx; }

function getExData(day, session, idx){
  var key=exKey(day,session,idx);
  return STATE.exercises&&STATE.exercises[key]?STATE.exercises[key]:{weight:0,successCount:0,history:[]};
}

function saveExData(day, session, idx, data){
  if(!STATE.exercises)STATE.exercises={};
  STATE.exercises[exKey(day,session,idx)]=data;
  saveStore();
}

function getSuggestedWeight(day, session, idx){
  var data=getExData(day,session,idx);
  if(!data.weight)return null; // not set yet
  return data.weight;
}

function recordSetResult(day, session, idx, weight, completed){
  var data=getExData(day,session,idx);
  if(!data.history)data.history=[];
  data.weight=weight;
  // track consecutive successes
  if(completed){
    data.successCount=(data.successCount||0)+1;
    if(data.successCount>=2){
      // determine increment: bigger for compounds, smaller for isolations
      var ex=TRAINING[day][session][idx];
      var isCompound=["Barbell Bench Press","Barbell Back Squat","Deadlift","Barbell Row","Weighted Pull-ups","Front Squat","Sumo Deadlift","Romanian Deadlift","Overhead Press"].indexOf(ex.n)>=0;
      data.weight=parseFloat((data.weight+(isCompound?2.5:1.25)).toFixed(2));
      data.successCount=0;
      data.progressed=true;
    }
  } else {
    data.successCount=0;
    data.progressed=false;
  }
  data.history.push({date:todayKey(),weight:weight,completed:completed});
  if(data.history.length>20)data.history=data.history.slice(-20);
  saveExData(day,session,idx,data);
}

function updateSetWeight(day, session, idx, weight){
  var data=getExData(day,session,idx);
  data.weight=parseFloat(weight)||0;
  if(!data.successCount)data.successCount=0;
  saveExData(day,session,idx,data);
}

// -- SET STATE HELPERS -----------------------------------------------------
function getSetsDone(day, session, exIdx){
  var key="sets_"+todayKey()+"_"+day+"_"+session+"_"+exIdx;
  return STATE.setsDone&&STATE.setsDone[key]?STATE.setsDone[key]:{};
}

function markSetDone(day, session, exIdx, setIdx, weight){
  if(!STATE.setsDone)STATE.setsDone={};
  var key="sets_"+todayKey()+"_"+day+"_"+session+"_"+exIdx;
  if(!STATE.setsDone[key])STATE.setsDone[key]={};
  var wasDone=STATE.setsDone[key][setIdx];
  STATE.setsDone[key][setIdx]=!wasDone;
  // if completing final working set, record result
  var ex=TRAINING[day][session][exIdx];
  if(ex&&ex.weighted){
    var totalSets=ex.sets;
    var workingSets=Object.keys(STATE.setsDone[key]).filter(function(k){return k!=="0"&&STATE.setsDone[key][k];}).length;
    var allDone=workingSets>=totalSets;
    recordSetResult(day,session,exIdx,weight,allDone);
  }
  saveStore();
  render();
}

// -- MUSCLE GROUP TRACKING -------------------------------------------------
function getMuscleStats(){
  var counts={chest:0,back:0,shoulders:0,triceps:0,biceps:0,rear_delt:0,quads:0,hamstrings:0,glutes:0,calves:0,core:0};
  var days7=[];
  for(var i=0;i<7;i++){var d=new Date();d.setDate(d.getDate()-i);days7.push(d.toISOString().slice(0,10));}
  days7.forEach(function(dk){
    var dow=new Date(dk).getDay();
    var dayKey=["SUN","MON","TUE","WED","THU","FRI","SAT"][dow];
    var dayData=STATE.days[dk];
    if(!dayData||!TRAINING[dayKey])return;
    TRAINING[dayKey].pm.forEach(function(ex,i){
      if(!ex.weighted)return;
      var done=dayData.training&&dayData.training.pm&&dayData.training.pm[i];
      if(done&&ex.muscle&&counts.hasOwnProperty(ex.muscle))counts[ex.muscle]++;
    });
  });
  return counts;
}

// -- NUTRITION TRACKING ----------------------------------------------------
function getDailyNutrition(){
  // Estimate macros from checked meals
  var macroMap={
    m1:{p:45,c:95,f:35},  // Jimmy Joy shake
    m2:{p:55,c:5,f:18},   // beef + veg
    m3:{p:52,c:25,f:16},  // beef + rice
    m4:{p:30,c:45,f:8},   // shake + banana
    m5:{p:68,c:12,f:28},  // beef + eggs
    m6:{p:12,c:6,f:3},    // cottage cheese
  };
  var d=STATE.days[today];
  var p=0,c=0,f=0;
  MEALS.forEach(function(m){
    if(d.meals[m.id]&&macroMap[m.id]){
      p+=macroMap[m.id].p;
      c+=macroMap[m.id].c;
      f+=macroMap[m.id].f;
    }
  });
  return{protein:p,carbs:c,fat:f,
    targetProtein:230,targetCarbs:260,targetFat:107};
}

  var pct=actual/target;
  if(pct>=0.9)return"diff-ok";
  if(pct>=0.6)return"diff-under";
  return"diff-over";
}

var trainViewDay=null;
var trainWeekOffset=0;
function getTrainWeekDates(offset){
  var now=new Date();
  var dayOfWeek=(now.getDay()+6)%7;
  var monday=new Date(now);
  monday.setDate(now.getDate()-dayOfWeek+(offset*7));
  var week=[];
  for(var i=0;i<7;i++){
    var d=new Date(monday);
    d.setDate(monday.getDate()+i);
    week.push({date:d,key:d.toISOString().slice(0,10),dow:DAYS[i]});
  }
  return week;
}
function renderTrainCalendar(vd){
  var week=getTrainWeekDates(trainWeekOffset);
  var todayStr=todayKey();
  var monthLabel=week[0].date.toLocaleDateString("en",{month:"short"});
  var monthLabel2=week[6].date.toLocaleDateString("en",{month:"short"});
  var weekLabel=monthLabel===monthLabel2?week[0].date.toLocaleDateString("en",{month:"long",year:"numeric"}):monthLabel+" - "+monthLabel2+" "+week[6].date.getFullYear();
  var html="<div class=\"train-cal\">";
  html+="<div class=\"train-cal-header\">";
  html+="<button class=\"train-cal-nav\" onclick=\"trainWeekOffset--;renderTrain()\">&lsaquo;</button>";
  html+="<span class=\"train-cal-month\">"+weekLabel.toUpperCase()+"</span>";
  html+="<button class=\"train-cal-nav\" onclick=\"trainWeekOffset++;renderTrain()\">&rsaquo;</button>";
  html+="</div>";
  html+="<div class=\"train-cal-week\">";
  week.forEach(function(w){
    var isSel=w.dow===vd;
    var isTod=w.key===todayStr;
    var focus=TRAINING[w.dow]?TRAINING[w.dow].focus:"Rest";
    var totalEx=(TRAINING[w.dow]?(TRAINING[w.dow].am||[]).length+(TRAINING[w.dow].pm||[]).length:0);
    var isRest=totalEx===0||w.dow==="SUN";
    html+="<div class=\"train-cal-day"+(isSel?" selected":"")+(isTod?" today":"")+(isRest?" rest":"")+"\" onclick=\"trainViewDay='"+w.dow+"';renderTrain()\">";
    html+="<span class=\"train-cal-dow\">"+w.dow+"</span>";
    html+="<span class=\"train-cal-date\">"+w.date.getDate()+"</span>";
    html+="<span class=\"train-cal-focus\">"+escHtml(focus)+"</span>";
    html+="</div>";
  });
  html+="</div></div>";
  return html;
}

function mealStatus(mealId, dateKey) {
  var dk = dateKey || today;
  var val = STATE.days[dk] && STATE.days[dk].meals ? STATE.days[dk].meals[mealId] : false;
  if (val === true) return "done";
  if (val === "missed") return "missed";
  if (val && typeof val === "object" && val.replaced) return "replaced";
  return "pending";
}
function mealActualKcal(mealId, dateKey) {
  var st = mealStatus(mealId, dateKey);
  if (st === "done") {
    var m = getTodaysMeals().find(function(x){return x.id===mealId;});
    return m ? m.kcal : 0;
  }
  if (st === "replaced") {
    var dk = dateKey || today;
    var val = STATE.days[dk].meals[mealId];
    return val.kcal || 0;
  }
  return 0;
}
function setMealStatus(mealId, status) {
  if (!isViewingToday()) return;
  var dk = todayKey();
  if (!STATE.days[dk]) STATE.days[dk] = emptyDay();
  if (status === "done") STATE.days[dk].meals[mealId] = true;
  else if (status === "missed") STATE.days[dk].meals[mealId] = "missed";
  else if (status === "pending") STATE.days[dk].meals[mealId] = false;
  saveStore();
  render();
}
async function saveMealReplace(mealId) {
  if (!isViewingToday()) return;

    if(btnEl){btnEl.disabled=false;btnEl.textContent="Retry";}
  }
}
async function estimateKcal(food, amount) {
  var prompt = "Estimate the total calories for this food:\n"
    + "Food: " + food + "\n"
    + "Amount: " + amount + "\n\n"
    + "Return ONLY a single integer number of kcal. No text, no explanation, no units — just the number.";
  var res = await fetch("/api/coach", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 50,
      system: "You are a nutrition calculator. You estimate calories from food descriptions. Return ONLY an integer number of kcal. Nothing else.",
      messages: [{role: "user", content: prompt}]
    })
  });
  if (!res.ok) throw new Error("API error");
  var data = await res.json();
  var text = data.content && data.content[0] ? data.content[0].text.trim() : "";
  var match = text.match(/(\d+)/);
  if (!match) throw new Error("No number in response");
  return parseInt(match[1], 10);
}

function buildForecast(logs, metric){
  if(logs.length<2)return{labels:[],actual:[],forecast:[]};
  // linear regression on last entries
  var n=logs.length;
  var vals=logs.map(function(l){
    if(metric==="weight")return l.weight;
    if(metric==="bf")return l.bf;
    return parseFloat((l.weight*(1-l.bf/100)).toFixed(1));
  });
  // days since first log
  var t0=new Date(logs[0].date).getTime();
  var xs=logs.map(function(l){return(new Date(l.date).getTime()-t0)/(1000*60*60*24);});
  // least squares slope
  var mx=xs.reduce(function(a,b){return a+b;},0)/n;
  var my=vals.reduce(function(a,b){return a+b;},0)/n;
  var num=0,den=0;
  for(var i=0;i<n;i++){num+=(xs[i]-mx)*(vals[i]-my);den+=(xs[i]-mx)*(xs[i]-mx);}
  var slope=den>0?num/den:0;
  var intercept=my-slope*mx;
  // target values
  var targets={weight:67,bf:13.5,muscle:54};
  var target=targets[metric];
  // forecast 60 days ahead or until target reached
  var lastX=xs[n-1];
  var lastDate=new Date(logs[n-1].date);
  var forecastLabels=[];
  var forecastVals=[];
  var daysToTarget=slope!==0?Math.abs((target-intercept)/slope):999;
  var forecastDays=Math.min(60,Math.round(daysToTarget)+14);
  for(var d=1;d<=forecastDays;d++){
    var fd=new Date(lastDate); fd.setDate(fd.getDate()+d);
    var fLabel=(fd.getMonth()+1)+"/"+fd.getDate();
    var fVal=parseFloat((intercept+slope*(lastX+d)).toFixed(1));
    forecastLabels.push(fLabel);
    forecastVals.push(fVal);
  }
  // actual data labels
  var actualLabels=logs.map(function(l){return l.date.slice(5);});
  var actualVals=vals;
  // days until target
  var daysEst=slope!==0?Math.ceil(Math.abs((target-(intercept+slope*lastX))/slope)):null;
  return{actualLabels:actualLabels,actualVals:actualVals,forecastLabels:forecastLabels,forecastVals:forecastVals,daysEst:daysEst,slope:slope};
}

function isMealSwapRequest(msg){
  var lower=msg.toLowerCase();
  var swapWords=["eat","want","chicken","fish","salmon","tuna","turkey","pasta","rice","swap","change","replace","tomorrow","tonight","different","instead"];
  var matchCount=0;
  swapWords.forEach(function(w){if(lower.indexOf(w)>=0)matchCount++;});
  return matchCount>=2;
}

// Minimal safe Markdown renderer: escapes HTML first, then applies a tiny
// whitelist of transforms (headers, bullets, bold, italic, inline code, fenced
// code + chart blocks). Good enough for the Claude replies the coach produces.
function mdToHtml(src){
  var s=String(src==null?"":src).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  var blocks=[];
  s=s.replace(/```(\w*)\n?([\s\S]*?)```/g,function(_,lang,body){
    var i=blocks.length;
    blocks.push({lang:(lang||"").toLowerCase(),body:body});
    return "\u0000BLK"+i+"\u0000";
  });
  s=s.replace(/`([^`\n]+)`/g,"<code>$1</code>");
  s=s.replace(/\*\*([^*\n]+?)\*\*/g,"<strong>$1</strong>");
  s=s.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g,"$1<em>$2</em>");
  var lines=s.split("\n");
  var out=[],inList=null;
  function closeList(){if(inList){out.push("</"+inList+">");inList=null;}}
  for(var i=0;i<lines.length;i++){
    var line=lines[i],m;
    if(/^\s*$/.test(line)){closeList();continue;}
    if((m=/^(#{1,4})\s+(.*)$/.exec(line))){closeList();out.push('<div class="coach-h">'+m[2]+'</div>');continue;}
    if((m=/^\s*[-•]\s+(.*)$/.exec(line))){if(inList!=="ul"){closeList();out.push("<ul>");inList="ul";}out.push("<li>"+m[1]+"</li>");continue;}
    if((m=/^\s*(\d+)\.\s+(.*)$/.exec(line))){if(inList!=="ol"){closeList();out.push("<ol>");inList="ol";}out.push("<li>"+m[2]+"</li>");continue;}
    closeList();
    out.push("<p>"+line+"</p>");
  }
  closeList();
  var html=out.join("");
  html=html.replace(/\u0000BLK(\d+)\u0000/g,function(_,idx){
    var b=blocks[+idx];
    if(b.lang==="chart"){
      return '<div class="coach-chart" data-chart="'+encodeURIComponent(b.body)+'"></div>';
    }
    if(b.lang==="json"){return "";} // already consumed by meal-swap pipeline
    var esc=b.body.replace(/&/g,"&amp;").replace(/</g,"&lt;");
    return "<pre><code>"+esc+"</code></pre>";
  });
  return html;
}

async function sendCoach(){
  var input=document.getElementById("coach-input");
  var msg=input?input.value.trim():"";
  if(!msg)return;
  input.value="";

  var messagesEl=document.getElementById("coach-messages");
  coachHistory.push({role:"user",content:msg});
  messagesEl.innerHTML+="<div class=\"msg user\">"+escHtml(msg)+"<\/div>";
  var loadId="load-"+Date.now();
  messagesEl.innerHTML+="<div class=\"msg ai loading\" id=\""+loadId+"\">Thinking...</div>";
  messagesEl.scrollTop=messagesEl.scrollHeight;

  var isMealSwap=isMealSwapRequest(msg);
  var targetDate=msg.toLowerCase().indexOf("tomorrow")>=0?getDateStr(1):msg.toLowerCase().indexOf("today")>=0?getDateStr(0):getDateStr(1);

  try{
    var systemPrompt=buildContext();
    if(isMealSwap){
      var swapNote="IMPORTANT: Swap meals 2-6 only (never meal 1 shake). Keep calories near "+getDynamicTarget()+". Return all 6 meals as JSON array. Format: ```json {note:string, meals:[{id,time,name,kcal,items:[{n,q}]}]} ``` Target date: "+targetDate;
      systemPrompt=systemPrompt+"\n\n"+swapNote;
    }

    var res=await fetch("/api/coach",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-5",
        max_tokens:1500,
        system:systemPrompt,
        messages:coachHistory.slice(-10),
      })
    });
    var data=await res.json();
    if(!res.ok){
      var errMsg=(data&&data.error&&(data.error.message||data.error))||("HTTP "+res.status);
      document.getElementById(loadId).textContent="Coach error: "+errMsg;
      document.getElementById(loadId).classList.remove("loading");
      messagesEl.scrollTop=messagesEl.scrollHeight;
      return;
    }
    var reply=data.content&&data.content[0]?data.content[0].text:"Sorry, something went wrong.";
    coachHistory.push({role:"assistant",content:reply});

    // Try to apply meal swap if JSON found
    if(isMealSwap){
      var jsonMatch=reply.match(/```json([\s\S]*?)```/);
      if(jsonMatch){
        var applied=parseMealSwap(jsonMatch[1],targetDate);
        var cleanReply=reply.replace(/```json[\s\S]*?```/,"").trim();
        if(applied){
          renderCoachReply(loadId, cleanReply, true, targetDate);
        } else {
          renderCoachReply(loadId, cleanReply);
        }
      } else {
        renderCoachReply(loadId, reply);
      }
    } else {
      renderCoachReply(loadId, reply);
    }
  }catch(e){
    var el=document.getElementById(loadId);
    if(el){el.textContent="Connection error. Try again.";el.classList.remove("loading");}
  }
  messagesEl.scrollTop=messagesEl.scrollHeight;
}

function getMissedItems(dateKey){
  var d=STATE.days[dateKey];
  if(!d)return null;
  var dow=new Date(dateKey).getDay();
  var dayKey=["SUN","MON","TUE","WED","THU","FRI","SAT"][dow];
  var missed={meals:[],supps:[],peptides:[],training:[]};
  MEALS.forEach(function(m){if(!d.meals[m.id])missed.meals.push(m.name);});
  SUPPS.forEach(function(s){if(!d.supps[s.id])missed.supps.push(s.name);});
  PEPTIDES.forEach(function(p){if(!d.peptides[p.id])missed.peptides.push(p.name);});
  var t=TRAINING[dayKey]||{am:[],pm:[]};
  t.am.forEach(function(ex,i){if(!d.training.am||!d.training.am[i])missed.training.push(ex.n);});
  t.pm.forEach(function(ex,i){if(!d.training.pm||!d.training.pm[i])missed.training.push(ex.n);});
  return missed;
}

function getStreaks(){
  var mealStreak=0,trainStreak=0,fullStreak=0;
  var d=new Date();
  for(var i=0;i<30;i++){
    d.setDate(d.getDate()-(i===0?0:1));
    var key=d.toISOString().slice(0,10);
    var day=STATE.days[key];
    if(!day)break;
    var mDone=Object.values(day.meals).filter(Boolean).length;
    var tAm=Object.values(day.training.am||{}).filter(Boolean).length;
    var tPm=Object.values(day.training.pm||{}).filter(Boolean).length;
    var tDone=tAm+tPm;
    var dow=new Date(key).getDay();
    var dk=["SUN","MON","TUE","WED","THU","FRI","SAT"][dow];
    var tTotal=(TRAINING[dk]?TRAINING[dk].am.length+TRAINING[dk].pm.length:0);
    var mealOk=mDone>=4;
    var trainOk=tTotal===0||tDone/tTotal>=0.7;
    if(i===0){
      if(mealOk)mealStreak++;
      if(trainOk)trainStreak++;
      if(mealOk&&trainOk)fullStreak++;
    } else {
      if(mealOk)mealStreak++; else if(mealStreak>0&&i>0)break;
      if(trainOk)trainStreak++; else if(trainStreak>0&&i>0)break;
      if(mealOk&&trainOk)fullStreak++; else if(fullStreak>0&&i>0)break;
    }
  }
  return{meal:mealStreak,train:trainStreak,full:fullStreak};
}

function runWeeklyAutoAdjust(){
  // Only run on Monday and if not already run this week
  if(!isMonday())return;
  var lastAdj=STATE.lastAutoAdjust||"";
  if(lastAdj===todayKey())return;

  var stats=getLastWeekStats();
  if(!stats||stats.days<3)return;

  var currentTarget=STATE.weeklyKcalTarget||2900;
  var newTarget=currentTarget;
  var changes=[];
  var trainingSuggestions=[];
  var mealSuggestions=[];

  // Weight trend adjustment
  var logs=STATE.bodyLog||[];
  if(logs.length>=2){
    var recent=logs.slice(-2);
    var wDiff=recent[1].weight-recent[0].weight;
    var daysBetween=Math.max(1,(new Date(recent[1].date)-new Date(recent[0].date))/(1000*60*60*24));
    var weeklyRate=wDiff/daysBetween*7;
    if(weeklyRate<-1.2){
      newTarget=Math.min(3400,newTarget+200);
      changes.push("Weight loss too fast ("+weeklyRate.toFixed(1)+"kg/wk) - calories +200 kcal to protect muscle");
    } else if(weeklyRate>-0.1&&weeklyRate<0.3){
      newTarget=Math.max(2400,newTarget-150);
      changes.push("Weight stalling ("+weeklyRate.toFixed(1)+"kg/wk) - calories -150 kcal to restart loss");
    } else if(weeklyRate>=-0.9&&weeklyRate<=-0.2){
      changes.push("Weight loss on track ("+weeklyRate.toFixed(1)+"kg/wk) - calories unchanged at "+currentTarget);
    }
  }

  // Training compliance adjustments
  if(stats.avgTrain<0.6){
    trainingSuggestions.push("Training below 60% - consider switching to 5-day split (drop one Legs day)");
    if(newTarget===currentTarget){newTarget=Math.max(2400,newTarget-100);changes.push("Low training compliance - calories -100 kcal");}
  } else if(stats.avgTrain>=0.85){
    trainingSuggestions.push("Strong training week - add 2.5kg to main compound lifts (bench, squat, deadlift, row)");
  }

  // Meal compliance adjustments
  if(stats.avgMeal<0.7){
    mealSuggestions.push("Meal compliance below 70% - Meal 4 (Pre-PM) most often skipped. Consider replacing with 2 boiled eggs + banana for simplicity.");
    if(newTarget===currentTarget){newTarget=Math.max(2400,newTarget-50);changes.push("Low meal compliance - target -50 kcal to match actual intake");}
  } else if(stats.avgMeal>=0.95){
    mealSuggestions.push("Perfect meal compliance - consider adding 50g extra beef to Meal 5 for additional protein.");
  }

  // Save adjustments
  STATE.weeklyKcalTarget=newTarget;
  STATE.lastAutoAdjust=todayKey();
  STATE.lastAdjustChanges=changes;
  STATE.lastAdjustTraining=trainingSuggestions;
  STATE.lastAdjustMeals=mealSuggestions;
  STATE.weeklyDismissed=false;
  weeklyDismissed=false;
  saveStore();
}

  var cutoffStr=cutoff.toISOString().slice(0,10);

// Parse AI meal swap response and apply it
function parseMealSwap(jsonStr, targetDate){
  try{
    var clean=jsonStr.replace(/```json|```/g,"").trim();
    var data=JSON.parse(clean);
    if(data.meals&&Array.isArray(data.meals)){
      applyMealOverride(targetDate, data.meals, data.note||"Custom menu");
      return true;
    }
  }catch(e){console.log("Parse error:",e);}
  return false;
}

function getDayScore(dateKey){
  var d=STATE.days[dateKey];
  if(!d)return null;
  var mealsDone=Object.values(d.meals||{}).filter(Boolean).length;
  var suppsDone=Object.values(d.supps||{}).filter(Boolean).length;
  var dow=new Date(dateKey+"T12:00:00").getDay();
  var dk=["SUN","MON","TUE","WED","THU","FRI","SAT"][dow];
  var tTotal=TRAINING[dk]?TRAINING[dk].am.length+TRAINING[dk].pm.length:0;
  var tDone=Object.values(d.training&&d.training.am||{}).filter(Boolean).length+Object.values(d.training&&d.training.pm||{}).filter(Boolean).length;
  var mealPct=mealsDone/MEALS.length;
  var trainPct=tTotal>0?tDone/tTotal:1;
  var suppPct=suppsDone/(SUPPS.length||1);
  var overall=(mealPct+trainPct+suppPct)/3;
  return{overall:overall,mealPct:mealPct};
}
function dayScoreColor(score){
  if(!score)return"#1a1a1a";

  if(score.overall>=0.5)return"#ffb347";
  if(score.overall>0)return"#ff5c35";
  return"#252525";
}

// --- Training settings ---
var settingsTrainOpen=null;
var aiTrainWizardOpen=false;
var aiTrainDays=5, aiTrainSplit="ppl", aiTrainGoal="hypertrophy", aiTrainAM=true;
var aiTrainEquip="Full gym", aiTrainNotes="";
function saveTrainingConfig(){
  if(!STATE.config)STATE.config={};
  STATE.config.training=JSON.parse(JSON.stringify(TRAINING));
  STATE.config.dayFocus=JSON.parse(JSON.stringify(DAY_FOCUS));
  saveStore();
}
function updateDayFocus(day,val){
  TRAINING[day].focus=val.trim();
  DAY_FOCUS[day]=val.trim()+(TRAINING[day].pm&&TRAINING[day].pm.length>0?" - "+TRAINING[day].pm.map(function(e){return e.muscle;}).filter(function(v,i,a){return a.indexOf(v)===i;}).slice(0,3).join("/"):"");
  saveTrainingConfig();
}
function removeExercise(day,session,idx){
  if(!TRAINING[day]||!TRAINING[day][session])return;
  TRAINING[day][session].splice(idx,1);
  saveTrainingConfig();renderSettings();
}
function addExercise(day,session){
  var nameEl=document.getElementById("add-ex-"+day+"-"+session+"-name");
  var setsEl=document.getElementById("add-ex-"+day+"-"+session+"-sets");
  var muscleEl=document.getElementById("add-ex-"+day+"-"+session+"-muscle");
  var name=nameEl?nameEl.value.trim():"";
  var setsStr=setsEl?setsEl.value.trim():"";
  var muscle=muscleEl?muscleEl.value.trim():"general";
  if(!name)return;
  if(!TRAINING[day])TRAINING[day]={focus:"",am:[],pm:[]};
  if(!TRAINING[day][session])TRAINING[day][session]=[];
  if(session==="am"){
    TRAINING[day][session].push({n:name,s:setsStr||"3x12",muscle:muscle||"general",weighted:false});
  } else {
    var parts=setsStr.match(/^(\d+)\s*x\s*(.+)$/);
    var sets=parts?parseInt(parts[1],10):3;
    var reps=parts?parts[2]:"10";
    TRAINING[day][session].push({n:name,sets:sets,reps:reps,muscle:muscle||"general",weighted:true});
  }
  saveTrainingConfig();renderSettings();
}

async function generateAITraining(){
  var equipEl=document.getElementById("ai-train-equip");
  var notesEl=document.getElementById("ai-train-notes");
  if(equipEl)aiTrainEquip=equipEl.value.trim();
  if(notesEl)aiTrainNotes=notesEl.value.trim();
  var statusEl=document.getElementById("ai-train-status");
  var btnEl=document.getElementById("ai-train-btn");
  if(statusEl){statusEl.textContent="Generating your program...";statusEl.className="rep-status rep-loading";}
  if(btnEl){btnEl.disabled=true;btnEl.textContent="Generating...";}
  var prompt="Create a complete weekly training program with these parameters:\n"
    +"- Days per week: "+aiTrainDays+"\n"
    +"- Split: "+aiTrainSplit.replace("_"," ")+"\n"
    +"- Goal: "+aiTrainGoal+"\n"
    +"- Include AM structural/mobility session: "+(aiTrainAM?"yes":"no")+"\n"
    +"- Equipment: "+(aiTrainEquip||"full gym")+"\n"
    +(aiTrainNotes?"- Notes: "+aiTrainNotes+"\n":"")
    +"\nReturn ONLY valid JSON, no other text. Format:\n"
    +'{"training":{"MON":{"focus":"Push A","am":[{"n":"Exercise","s":"3x12","muscle":"core","weighted":false}],"pm":[{"n":"Exercise","sets":4,"reps":"8","muscle":"chest","weighted":true}]},"TUE":{...},...,"SUN":{...}},"dayFocus":{"MON":"Push A - Chest/Shoulders","TUE":"Pull A - Back/Biceps",...,"SUN":"Rest & Recovery"}}\n'
    +"Rules:\n"
    +"- All 7 days must be present (rest days have empty am:[] and pm:[] with focus:'Recovery')\n"
    +"- AM exercises use {n, s, muscle, weighted:false}\n"
    +"- PM exercises use {n, sets, reps, muscle, weighted:true}\n"
    +"- muscle is a single lowercase word (chest, back, shoulders, quads, hamstrings, glutes, calves, biceps, triceps, core, neck, fascia, cardio, recovery)\n"
    +"- dayFocus values: 'Focus - Muscle1/Muscle2' format\n";
  try{
    var res=await fetch("/api/coach",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:4000,
        system:"You are a professional strength and conditioning coach. Return ONLY valid JSON, no markdown fencing, no explanation.",
        messages:[{role:"user",content:prompt}]
      })
    });
    if(!res.ok)throw new Error("API error "+res.status);
    var data=await res.json();
    var text=data.content&&data.content[0]?data.content[0].text.trim():"";
    // strip any markdown fencing
    text=text.replace(/^```json\s*/,"").replace(/```\s*$/,"").trim();
    var parsed=JSON.parse(text);
    if(!parsed.training)throw new Error("Missing training key");
    TRAINING=parsed.training;
    DAYS.forEach(function(d){if(!TRAINING[d])TRAINING[d]={focus:"Rest",am:[],pm:[]};});
    if(parsed.dayFocus)DAY_FOCUS=parsed.dayFocus;
    else DAYS.forEach(function(d){DAY_FOCUS[d]=TRAINING[d].focus||"Rest";});
    saveTrainingConfig();
    aiTrainWizardOpen=false;
    renderSettings();
  }catch(e){
    if(statusEl){statusEl.textContent="Failed: "+(e.message||"Unknown error")+". Try again.";statusEl.className="rep-status rep-error";}
    if(btnEl){btnEl.disabled=false;btnEl.textContent="Retry";}
  }
}

function authSelectProfile(handle){
  const a=loadAccounts().find(x=>x.handle===handle);

    +'<div class="input-label">Password for '+escHtml(a.name)+'</div>'

function authSubmitLogin(handle){

function authCreateProfile(){
  const name=(document.getElementById("au-name")||{}).value||"";
  const pw=(document.getElementById("au-pw")||{}).value||"";
  try{
    const a=createAccount(name,pw);
    loginAs(a);
  }catch(e){ document.getElementById("au-err").textContent=e.message; }
}
function loginAs(acc){
  setSession(acc.id);
  // One-time legacy migration: if this is the very first account ever created on this
  // device and there's data in the old global key, move it into this account.
  const accounts=loadAccounts();
  if(accounts.length===1){
    const legacy=localStorage.getItem("fitblueprint_v2");
    if(legacy&&!localStorage.getItem(storeKey())){
      localStorage.setItem(storeKey(),legacy);
    }
  }
  bootApp();
}

        +'<input class="onb-item-dose" placeholder="Dose" value="'+escHtml(it.dose||"")+'" oninput="onbUpdateField(\''+prefix+'\','+i+',\'dose\',this.value)">'
        +'<select class="onb-item-tag" onchange="onbUpdateField(\''+prefix+'\','+i+',\'tag\',this.value)">'
          +SUPP_TAGS.map(function(t){return '<option value="'+t.v+'"'+(it.tag===t.v?' selected':'')+'>'+t.v+'</option>';}).join('')
        +'</select>'
        +'<button class="onb-del" title="Remove" onclick="onbRemoveItem(\''+prefix+'\','+i+')">×</button>'
      +'</div>';
    }).join('');
  };
  const s=document.getElementById("onb-supps");
  const p=document.getElementById("onb-peps");
  if(s)s.innerHTML=rowHtml(onbSupps,"supps");
  if(p)p.innerHTML=rowHtml(onbPeps,"peps");
}
function onbUpdateField(prefix,i,field,val){
  const arr=prefix==="supps"?onbSupps:onbPeps;
  if(!arr[i])return;
  arr[i][field]=val;
  if(field==="tag")arr[i].tc=tagClassFor(val);
}
function onbAddItem(prefix){
  const arr=prefix==="supps"?onbSupps:onbPeps;
  const id=(prefix==="supps"?"s":"p")+"_"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  arr.push({id:id,name:"",dose:"",tag:"Morning",tc:"tag-morning"});
  onbRenderItems();
}
function onbRemoveItem(prefix,i){
  const arr=prefix==="supps"?onbSupps:onbPeps;
  arr.splice(i,1);
  onbRenderItems();
}
function finishOnboarding(){
  const cw=parseFloat(document.getElementById("onb-cw").value)||STATE.currentWeight||70;
  const cbf=parseFloat(document.getElementById("onb-cbf").value)||STATE.currentBF||20;
  const tw=parseFloat(document.getElementById("onb-tw").value)||67;
  const tbf=parseFloat(document.getElementById("onb-tbf").value)||13.5;
  const kcal=parseInt(document.getElementById("onb-kcal").value,10)||2900;
  const cleanSupps=onbSupps.filter(function(s){return (s.name||"").trim();}).map(function(s){return{id:s.id,name:s.name.trim(),dose:(s.dose||"").trim(),tag:s.tag||"Morning",tc:tagClassFor(s.tag||"Morning")};});
  const cleanPeps=onbPeps.filter(function(p){return (p.name||"").trim();}).map(function(p){return{id:p.id,name:p.name.trim(),dose:(p.dose||"").trim(),tag:p.tag||"Morning",tc:tagClassFor(p.tag||"Morning")};});
  const acc=currentAccount();
  STATE.config={
    displayName:acc?acc.name:"",
    phase:onbPhase,
    targetWeight:tw, targetBF:tbf,
    weeklyKcalTarget:kcal,
    supps:cleanSupps,
    peptides:cleanPeps,
    onboarded:true,
    onboardedAt:new Date().toISOString(),
  };
  STATE.currentWeight=cw;
  STATE.currentBF=cbf;
  // only overwrite the starting baseline on first onboarding
  if(!STATE.startWeight || STATE.startWeight===70)STATE.startWeight=cw;
  if(!STATE.startBF || STATE.startBF===20)STATE.startBF=cbf;
  if(!STATE.startDate)STATE.startDate=todayKey();
  STATE.phase=onbPhase;
  STATE.weeklyKcalTarget=kcal;
  saveStore();
  bootApp();
}

// --- SCREEN RENDERING ---------------------------------------------------------
function mountScreen(html){
  document.body.classList.add("auth-mode");
  const host=document.getElementById("auth-root")||(function(){
    const d=document.createElement("div"); d.id="auth-root"; document.body.appendChild(d); return d;
  })();
  host.innerHTML=html;
}
function unmountScreen(){
  document.body.classList.remove("auth-mode");
  const host=document.getElementById("auth-root");
  if(host)host.remove();
}

function ensureMainHeader(){
  if(document.getElementById("main-header"))return;
  document.body.insertAdjacentHTML("afterbegin",'<div class="header" id="main-header">'
    +'<div class="header-label" id="hdr-label">PERFORMANCE BLUEPRINT</div>'
    +'<div class="header-title" id="hdr-title">Loading...</div>'
    +'<div class="header-sub" id="hdr-sub"></div>'
    +'<button class="header-logout" onclick="logout()" title="Switch profile / sign out" aria-label="Sign out">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>'
    +'</button>'
  +'</div>');
}

function primeCoachWelcome(){
  const box=document.getElementById("coach-messages");
  if(!box||box.childElementCount>0)return;
  const name=(STATE&&STATE.config&&STATE.config.displayName)||"there";
  const msg=document.createElement("div");
  msg.className="msg ai";
  msg.textContent="Hey "+name+" 👋 I know your full plan — meals, training, peptides, body metrics. Ask me anything about your progress, adjustments, or how you feel today.";
  box.appendChild(msg);
}

// --- BOOT ---------------------------------------------------------------------
function bootApp(){
  if(!currentAccount()){ mountScreen(buildAuthScreen()); return; }
  STATE=loadStore()||createDefaultState();
  if(!STATE.config||!STATE.config.onboarded){
    mountScreen(buildOnboarding());
    onbRenderItems();
    return;
  }
  applyUserConfig();
  today=todayKey();
  DOW=getDOW();
  viewDate=today;
  if(!STATE.days[today]){STATE.days[today]=emptyDay();saveStore();}
  checkWeeklyReset();
  runWeeklyAutoAdjust();
  clearOldOverrides();
  weeklyDismissed=STATE.weeklyDismissed||false;
  unmountScreen();
  ensureMainHeader();
  primeCoachWelcome();
  render();
  setTimeout(initBodyChart,100);
}

bootApp();
</script>
</body>
</html>
